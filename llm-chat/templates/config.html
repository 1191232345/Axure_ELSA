<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型配置 - LLM 智能问答</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="/static/css/chat.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#FF7D00',
                        danger: '#F53F3F',
                        success: '#00B42A',
                        neutral: {
                            100: '#F5F7FA',
                            200: '#E5E6EB',
                            300: '#C9CDD4',
                            400: '#86909C',
                            500: '#4E5969',
                            600: '#272E3B',
                            700: '#1D2129',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="font-inter bg-neutral-100 text-neutral-700 min-h-screen">
    <div class="min-h-screen flex flex-col">
        <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 border-b border-neutral-200">
            <div class="flex items-center">
                <a href="/" class="text-primary hover:text-primary/80 mr-4">
                    <i class="fa fa-arrow-left"></i>
                </a>
                <h1 class="text-xl font-bold text-neutral-700">模型配置</h1>
            </div>
            <button id="addConfigBtn" class="btn-primary">
                <i class="fa fa-plus mr-2"></i>添加配置
            </button>
        </header>
        
        <main class="flex-1 p-6">
            <div class="max-w-6xl mx-auto">
                <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                    <h2 class="text-lg font-semibold mb-4 flex items-center">
                        <i class="fa fa-cog mr-2 text-primary"></i>已配置的模型
                    </h2>
                    <div id="configsList" class="space-y-4">
                        <div class="text-center text-neutral-400 py-8">
                            <i class="fa fa-cog text-4xl mb-2"></i>
                            <p>暂无配置，请添加模型配置</p>
                        </div>
                    </div>
                </div>
                
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h2 class="text-lg font-semibold mb-4 flex items-center">
                        <i class="fa fa-info-circle mr-2 text-primary"></i>支持的模型提供商
                    </h2>
                    <div id="providersList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div id="configModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-neutral-200">
                <div class="flex items-center justify-between">
                    <h3 class="text-xl font-semibold" id="modalTitle">添加模型配置</h3>
                    <button id="closeModalBtn" class="text-neutral-400 hover:text-neutral-600">
                        <i class="fa fa-times text-xl"></i>
                    </button>
                </div>
            </div>
            
            <form id="configForm" class="p-6 space-y-4">
                <input type="hidden" id="configId">
                
                <div>
                    <label class="block text-sm font-medium text-neutral-700 mb-2">模型提供商 *</label>
                    <select id="provider" class="form-select w-full border border-neutral-300 rounded-lg px-3 py-2" required>
                        <option value="">请选择提供商</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-neutral-700 mb-2">API Key *</label>
                    <input type="password" id="apiKey" class="form-input w-full border border-neutral-300 rounded-lg px-3 py-2" placeholder="请输入 API Key" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-neutral-700 mb-2">Base URL（可选）</label>
                    <input type="url" id="baseUrl" class="form-input w-full border border-neutral-300 rounded-lg px-3 py-2" placeholder="自定义 API 地址">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-neutral-700 mb-2">模型名称 *</label>
                    <select id="modelName" class="form-select w-full border border-neutral-300 rounded-lg px-3 py-2" required>
                        <option value="">请先选择提供商</option>
                    </select>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-2">Temperature</label>
                        <input type="number" id="temperature" class="form-input w-full border border-neutral-300 rounded-lg px-3 py-2" value="0.7" min="0" max="2" step="0.1">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-2">Max Tokens</label>
                        <input type="number" id="maxTokens" class="form-input w-full border border-neutral-300 rounded-lg px-3 py-2" value="2000" min="100" max="8000">
                    </div>
                </div>
                
                <div class="flex items-center">
                    <input type="checkbox" id="isDefault" class="form-checkbox h-4 w-4 text-primary border-neutral-300 rounded">
                    <label for="isDefault" class="ml-2 text-sm text-neutral-700">设为默认配置</label>
                </div>
                
                <div class="flex justify-end space-x-3 pt-4">
                    <button type="button" id="cancelBtn" class="btn-secondary">取消</button>
                    <button type="submit" class="btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="loadingOverlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-white rounded-lg p-6 flex items-center space-x-3">
            <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-primary"></div>
            <span>处理中...</span>
        </div>
    </div>
    
    <script src="/static/js/config.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/config-page.js"></script>
</body>
</html>
