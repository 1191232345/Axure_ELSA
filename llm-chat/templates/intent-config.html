<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>意图识别配置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/chat.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">意图识别配置</h1>
            <p class="text-gray-600 mt-2">配置意图类别、样本和置信度阈值</p>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2">
                <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">意图类别管理</h2>
                        <button onclick="showAddCategoryModal()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition">
                            添加类别
                        </button>
                    </div>
                    
                    <div id="categories-list" class="space-y-3">
                        <div class="text-gray-500 text-center py-8">加载中...</div>
                    </div>
                </div>
                
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">意图测试</h2>
                    
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2">测试文本</label>
                        <textarea id="test-text" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="输入测试文本..."></textarea>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-gray-700 mb-2">Top K</label>
                            <input type="number" id="test-top-k" value="5" min="1" max="10" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">最小置信度</label>
                            <input type="number" id="test-min-confidence" value="0.0" min="0" max="1" step="0.1" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    
                    <button onclick="testIntentRecognition()" class="w-full bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg transition">
                        测试识别
                    </button>
                    
                    <div id="test-result" class="mt-4 hidden">
                        <h3 class="text-lg font-semibold text-gray-800 mb-2">识别结果</h3>
                        <div id="test-result-content"></div>
                    </div>
                </div>
            </div>
            
            <div class="lg:col-span-1">
                <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">全局配置</h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-gray-700 mb-2">全局置信度阈值</label>
                            <input type="number" id="global-threshold" value="0.7" min="0" max="1" step="0.1" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        
                        <div>
                            <label class="block text-gray-700 mb-2">最大返回意图数</label>
                            <input type="number" id="max-results" value="5" min="1" max="10" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        
                        <button onclick="updateGlobalConfig()" class="w-full bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition">
                            保存配置
                        </button>
                    </div>
                </div>
                
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">系统状态</h2>
                    
                    <div class="space-y-3">
                        <div class="flex justify-between">
                            <span class="text-gray-600">Embedding 服务:</span>
                            <span id="embedding-status" class="text-gray-500">检查中...</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">缓存大小:</span>
                            <span id="cache-size" class="text-gray-500">-</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">意图类别数:</span>
                            <span id="category-count" class="text-gray-500">-</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">样本总数:</span>
                            <span id="sample-count" class="text-gray-500">-</span>
                        </div>
                        
                        <button onclick="clearCache()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-lg transition mt-4">
                            清除缓存
                        </button>
                        <button onclick="refreshCache()" class="w-full bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-lg transition">
                            刷新缓存
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="add-category-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
            <h3 class="text-xl font-semibold text-gray-800 mb-4">添加意图类别</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700 mb-2">类别名称 *</label>
                    <input type="text" id="category-name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如: 产品咨询">
                </div>
                
                <div>
                    <label class="block text-gray-700 mb-2">描述</label>
                    <textarea id="category-description" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="类别描述..."></textarea>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 mb-2">置信度阈值</label>
                        <input type="number" id="category-threshold" value="0.7" min="0" max="1" step="0.1" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">优先级</label>
                        <input type="number" id="category-priority" value="0" min="0" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <div class="flex items-center">
                    <input type="checkbox" id="category-active" checked class="mr-2">
                    <label class="text-gray-700">启用</label>
                </div>
            </div>
            
            <div class="flex justify-end space-x-3 mt-6">
                <button onclick="hideAddCategoryModal()" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                    取消
                </button>
                <button onclick="createCategory()" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition">
                    创建
                </button>
            </div>
        </div>
    </div>
    
    <div id="add-sample-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
            <h3 class="text-xl font-semibold text-gray-800 mb-4">添加意图样本</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700 mb-2">样本文本 *</label>
                    <textarea id="sample-text" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="输入样本文本..."></textarea>
                </div>
                
                <div>
                    <label class="block text-gray-700 mb-2">批量添加（每行一个样本）</label>
                    <textarea id="batch-samples" rows="5" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="样本1&#10;样本2&#10;样本3"></textarea>
                </div>
            </div>
            
            <div class="flex justify-end space-x-3 mt-6">
                <button onclick="hideAddSampleModal()" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                    取消
                </button>
                <button onclick="createSample()" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition">
                    添加单个
                </button>
                <button onclick="batchCreateSamples()" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition">
                    批量添加
                </button>
            </div>
        </div>
    </div>

    <script src="/static/js/intent-config.js"></script>
</body>
</html>
