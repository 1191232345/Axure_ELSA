<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM 智能问答</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="/static/css/chat.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#FF7D00',
                        danger: '#F53F3F',
                        success: '#00B42A',
                        neutral: {
                            100: '#F5F7FA',
                            200: '#E5E6EB',
                            300: '#C9CDD4',
                            400: '#86909C',
                            500: '#4E5969',
                            600: '#272E3B',
                            700: '#1D2129',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="font-inter bg-neutral-100 text-neutral-700 h-screen flex overflow-hidden">
    <div class="flex h-full w-full">
        <aside class="w-64 bg-white shadow-md h-full flex-shrink-0 flex flex-col transition-all duration-300" id="sidebar">
            <div class="p-4 border-b border-neutral-200">
                <h1 class="text-lg font-bold text-primary flex items-center">
                    <i class="fa fa-comments mr-2"></i>LLM 智能问答
                </h1>
            </div>
            
            <div class="p-3 border-b border-neutral-200">
                <button id="newChatBtn" class="w-full btn-primary flex items-center justify-center">
                    <i class="fa fa-plus mr-2"></i>新建对话
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-3" id="conversationList">
                <div class="text-center text-neutral-400 py-8">
                    <i class="fa fa-comments text-4xl mb-2"></i>
                    <p>暂无对话记录</p>
                </div>
            </div>
            
            <div class="p-3 border-t border-neutral-200">
                <a href="/config" class="block w-full btn-secondary text-center">
                    <i class="fa fa-cog mr-2"></i>模型配置
                </a>
            </div>
        </aside>
        
        <main class="flex-1 flex flex-col h-full bg-white">
            <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 border-b border-neutral-200">
                <div class="flex items-center">
                    <button class="md:hidden mr-4 text-neutral-600" id="toggleSidebar">
                        <i class="fa fa-bars"></i>
                    </button>
                    <h2 class="text-lg font-semibold" id="conversationTitle">新对话</h2>
                </div>
                <div class="flex items-center space-x-4">
                    <select id="modelSelect" class="form-select border border-neutral-300 rounded-lg px-3 py-2 text-sm">
                        <option value="">选择模型</option>
                    </select>
                    <button id="deleteConversationBtn" class="btn-danger text-sm" style="display: none;">
                        <i class="fa fa-trash mr-1"></i>删除对话
                    </button>
                </div>
            </header>
            
            <div class="flex-1 overflow-y-auto p-6" id="chatContainer">
                <div class="max-w-4xl mx-auto h-full flex flex-col justify-center items-center text-center" id="welcomeScreen">
                    <div class="mb-8">
                        <i class="fa fa-robot text-8xl text-primary mb-4"></i>
                        <h1 class="text-3xl font-bold text-neutral-700 mb-2">欢迎使用 LLM 智能问答</h1>
                        <p class="text-neutral-500">请先配置模型，然后开始对话</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl">
                        <div class="bg-neutral-50 rounded-lg p-4 text-left hover:shadow-md transition-shadow cursor-pointer suggestion-card">
                            <div class="flex items-start">
                                <i class="fa fa-lightbulb-o text-2xl text-secondary mr-3 mt-1"></i>
                                <div>
                                    <h3 class="font-semibold mb-1">解释概念</h3>
                                    <p class="text-sm text-neutral-500">帮我解释什么是机器学习</p>
                                </div>
                            </div>
                        </div>
                        <div class="bg-neutral-50 rounded-lg p-4 text-left hover:shadow-md transition-shadow cursor-pointer suggestion-card">
                            <div class="flex items-start">
                                <i class="fa fa-code text-2xl text-success mr-3 mt-1"></i>
                                <div>
                                    <h3 class="font-semibold mb-1">编写代码</h3>
                                    <p class="text-sm text-neutral-500">帮我写一个 Python 函数</p>
                                </div>
                            </div>
                        </div>
                        <div class="bg-neutral-50 rounded-lg p-4 text-left hover:shadow-md transition-shadow cursor-pointer suggestion-card">
                            <div class="flex items-start">
                                <i class="fa fa-edit text-2xl text-primary mr-3 mt-1"></i>
                                <div>
                                    <h3 class="font-semibold mb-1">撰写文章</h3>
                                    <p class="text-sm text-neutral-500">帮我写一篇技术博客</p>
                                </div>
                            </div>
                        </div>
                        <div class="bg-neutral-50 rounded-lg p-4 text-left hover:shadow-md transition-shadow cursor-pointer suggestion-card">
                            <div class="flex items-start">
                                <i class="fa fa-question-circle text-2xl text-danger mr-3 mt-1"></i>
                                <div>
                                    <h3 class="font-semibold mb-1">回答问题</h3>
                                    <p class="text-sm text-neutral-500">回答我的技术问题</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="max-w-4xl mx-auto space-y-6" id="messagesContainer" style="display: none;">
                </div>
            </div>
            
            <div class="bg-white border-t border-neutral-200 p-4">
                <div class="max-w-4xl mx-auto">
                    <div class="flex items-end space-x-3">
                        <div class="flex-1 relative">
                            <textarea 
                                id="messageInput" 
                                class="w-full border border-neutral-300 rounded-lg px-4 py-3 pr-12 resize-none focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                                placeholder="输入消息... (Shift+Enter 换行，Enter 发送)"
                                rows="1"
                                style="min-height: 48px; max-height: 200px;"
                            ></textarea>
                        </div>
                        <button id="sendBtn" class="btn-primary h-12 px-6 flex items-center justify-center" disabled>
                            <i class="fa fa-paper-plane mr-2"></i>发送
                        </button>
                    </div>
                    <div class="text-xs text-neutral-400 mt-2">
                        <i class="fa fa-info-circle mr-1"></i>
                        提示：Enter 发送，Shift+Enter 换行
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div id="loadingOverlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-white rounded-lg p-6 flex items-center space-x-3">
            <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-primary"></div>
            <span>处理中...</span>
        </div>
    </div>
    
    <script src="/static/js/config.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/markdown.js"></script>
    <script src="/static/js/chat.js"></script>
</body>
</html>
