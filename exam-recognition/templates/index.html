<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>试卷图片识别复刻系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>试卷图片识别复刻系统</h1>
            <p class="subtitle">上传试卷图片，自动识别并生成Word文档</p>
        </header>

        <main class="main-content">
            <section class="upload-section">
                <h2>上传试卷图片</h2>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </div>
                    <p class="upload-text">拖拽图片到此处或点击上传</p>
                    <p class="upload-hint">支持 JPG、PNG、JPEG 格式，单张最大 10MB</p>
                    <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
                </div>
                
                <div class="preview-section" id="previewSection" style="display: none;">
                    <h3>已选择的图片</h3>
                    <div class="preview-grid" id="previewGrid"></div>
                    <button class="btn btn-secondary" id="clearBtn">清空图片</button>
                </div>
            </section>

            <section class="result-section">
                <div class="result-header">
                    <h2>识别结果</h2>
                    <div class="result-actions">
                        <button class="btn btn-primary" id="recognizeBtn" disabled>
                            <span class="btn-text">开始识别</span>
                            <span class="btn-loading" style="display: none;">识别中...</span>
                        </button>
                    </div>
                </div>
                
                <div class="editor-container">
                    <textarea id="resultEditor" placeholder="识别结果将显示在这里，您可以编辑修改..."></textarea>
                </div>
                
                <div class="document-options">
                    <label for="documentTitle">文档标题：</label>
                    <input type="text" id="documentTitle" value="试卷" placeholder="请输入文档标题">
                </div>
            </section>

            <section class="action-section">
                <button class="btn btn-success btn-large" id="downloadBtn" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    下载Word文档
                </button>
            </section>
        </main>

        <footer class="footer">
            <p>© 2026 试卷图片识别复刻系统 | 基于 Flask + 百度OCR</p>
        </footer>
    </div>

    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner"></div>
        <p class="loading-text">正在处理，请稍候...</p>
    </div>

    <div class="toast" id="toast" style="display: none;"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
