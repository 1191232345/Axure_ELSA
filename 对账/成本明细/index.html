<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELSA</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" media="print" onload="this.media='all'">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11.6.3/dist/mermaid.min.js"></script>
  
  <link rel="stylesheet" href="../common/css/common.css">
  <link rel="stylesheet" href="css/main.css">
  
  <script src="js/init-config.js"></script>
</head>
<body class="font-sans bg-light-bg text-dark min-h-screen">
  <div class="tabs fixed bottom-8 right-8 z-40">
    <button id="tab-prototype" class="tab active" onclick="switchMainTab('prototype')">原型</button>
    <button id="tab-prd" class="tab" onclick="switchMainTab('prd')">PRD</button>
    <button id="tab-testcases" class="tab" onclick="switchMainTab('testcases')">测试用例</button>
  </div>
  
  <header class="bg-primary text-white shadow-header sticky top-0 z-50">
    <div class="container mx-auto px-2 sm:px-3 lg:px-4">
      <div class="flex justify-between items-center h-14">
        <div class="flex items-center">
          <div class="flex-shrink-0 flex items-center">
            <span class="text-lg font-semibold font-mono">ELSA</span>
          </div>
          <nav class="hidden md:ml-10 md:flex md:space-x-6">
            <div class="relative group">
              <a href="javascript:void(0)" class="px-3 py-2 text-sm hover:bg-primary/80 transition-colors flex items-center">
                费用管理
                <i class="fas fa-angle-down ml-1 text-xs"></i>
              </a>
              <div class="absolute left-0 mt-2 w-48 bg-white rounded shadow-dropdown opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                <a href="javascript:void(0)" class="block px-4 py-2 text-sm text-gray-900 hover:bg-gray-100" data-page="reconciliation">对账明细获取</a>
              </div>
            </div>
          </nav>
        </div>
        <div class="flex items-center space-x-4">
          <div class="relative">
            <button class="p-1.5 rounded hover:bg-primary/80 transition-colors">
              <i class="fas fa-bell-o"></i>
              <span class="absolute top-0 right-0 w-2 h-2 bg-warning rounded-full"></span>
            </button>
          </div>
          <div class="flex items-center">
            <span class="ml-2 text-sm hidden sm:inline-block">管理员</span>
            <i class="fas fa-angle-down ml-1 text-xs"></i>
          </div>
        </div>
      </div>
    </div>
  </header>
  
  <main id="main-prototype" class="main-content active flex-1 overflow-y-auto bg-light-bg">
    <div class="container mx-auto px-6 py-6 max-w-[1600px] min-h-[calc(100vh-56px)]">
          <div class="px-4 py-3 border-b border-gray-200">
              <div class="flex items-center justify-between">
                <h1 class="text-lg font-bold text-dark">成本明细</h1>
                <div class="flex items-center gap-2 text-sm text-gray-600">
                  <i class="fas fa-clock"></i>
                  <span id="lastUpdateTime">最后更新: -</span>
                </div>
              </div>
            </div>
          <div class="bg-white rounded shadow-card">
            <div class="px-4 py-3 border-b border-gray-200">
              <div class="flex items-center justify-between">
                <h2 class="text-base font-semibold text-dark flex items-center">
                  <i class="fas fa-filter mr-2"></i>检索条件
                </h2>
                <button onclick="toggleFilterPanel()" class="text-gray-400 hover:text-gray-600 transition-colors">
                  <i class="fas fa-chevron-up" id="filterToggleIcon"></i>
                </button>
              </div>
            </div>
            
            <div id="filterPanelContent" class="px-4 py-3">
              <div class="flex items-center justify-between gap-3 mb-3">
                <div id="coreFilters" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 flex-1"></div>
                <div class="flex items-center gap-2 flex-shrink-0">
                  <button id="btnFilter" class="erp-btn erp-btn-primary">
                    <i class="fas fa-search mr-1.5"></i>筛选
                  </button>
                  <button id="btnResetFilter" class="erp-btn erp-btn-secondary-outline">
                    <i class="fas fa-refresh mr-1.5"></i>重置
                  </button>
                </div>
              </div>
              
              <div id="auxFilters" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 pt-3 border-t border-gray-200"></div>
            </div>
          </div>


          <div class="px-4 py-3">
              <div class="flex items-center gap-2 flex-wrap">
                <button id="btnGetFee" class="erp-btn erp-btn-primary">
                  <i class="fas fa-download mr-1.5"></i>
                  <span>费用获取</span>
                </button>
                <button id="btnBatchGetFee" class="erp-btn erp-btn-primary">
                  <i class="fas fa-download mr-1.5"></i>
                  <span>批量获取费用</span>
                </button>
                <button id="btnExport" class="erp-btn erp-btn-warning">
                  <i class="fas fa-download mr-1.5"></i>
                  <span>导出账单</span>
                </button>
                <button id="btnExportDetail" class="erp-btn erp-btn-warning">
                  <i class="fas fa-download mr-1.5"></i>
                  <span>导出明细</span>
                </button>
              </div>
            </div>
        
            <div class="bg-white rounded shadow-card">
              <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
                <div class="flex items-center gap-4">
                  <span class="text-sm text-gray-600">
                    已选: <span id="selectedRecords" class="font-semibold text-primary">0</span> 条
                  </span>
                  <span class="text-sm text-gray-600">
                    金额合计: <span id="totalAmount" class="font-semibold text-accent font-mono">$0.00</span>
                  </span>
                </div>
                <div id="paginationInfo" class="text-sm text-gray-500">显示 0-0 条，共 0 条</div>
            </div>
            
            <div class="overflow-x-auto">
              <table id="reconciliationTable" class="w-full">
                <thead>
                  <tr class="bg-neutral-50 border-b border-gray-200">
                    <th class="text-left py-3 px-4 font-semibold text-gray-700 w-12">
                      <input type="checkbox" id="tableCheckAll" class="rounded border-gray-300">
                    </th>
                    <th class="text-left py-3 px-4 font-semibold text-gray-700">账单号</th>
                    <th class="text-left py-3 px-4 font-semibold text-gray-700">账单月</th>
                    <th class="text-left py-3 px-4 font-semibold text-gray-700">航期</th>
                    <th class="text-left py-3 px-4 font-semibold text-gray-700">客户代码</th>
                    <th class="text-left py-3 px-4 font-semibold text-gray-700">销售</th>
                    <th class="text-left py-3 px-4 font-semibold text-gray-700">客服</th>
                    <th class="text-left py-3 px-4 font-semibold text-gray-700">账单类型</th>
                    <th class="text-right py-3 px-4 font-semibold text-gray-700">账单金额</th>
                    <th class="text-left py-3 px-4 font-semibold text-gray-700">账单状态</th>
                    <th class="text-left py-3 px-4 font-semibold text-gray-700">操作人</th>
                    <th class="text-left py-3 px-4 font-semibold text-gray-700">操作时间</th>
                    <th class="text-left py-3 px-4 font-semibold text-gray-700">账单备注</th>
                    <th class="text-center py-3 px-4 font-semibold text-gray-700 w-32">操作</th>
                  </tr>
                </thead>
                <tbody id="reconciliationTableBody"></tbody>
              </table>
            </div>
            
            <div class="px-6 py-4 border-t border-gray-200 flex items-center justify-between">
              <div class="text-sm text-gray-600">
                每页显示
                <select id="pageSizeSelect" class="mx-2 px-2 py-1 border border-gray-300 rounded text-sm">
                  <option value="10">10</option>
                  <option value="20">20</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                </select>
                条
              </div>
              <div class="flex gap-2 items-center">
                <button id="prevPageBtn" class="w-8 h-8 flex items-center justify-center rounded border border-gray-200 hover:border-primary hover:text-primary transition-all">
                  <i class="fas fa-chevron-left text-xs"></i>
                </button>
                <div id="pageButtons" class="flex gap-2"></div>
                <button id="nextPageBtn" class="w-8 h-8 flex items-center justify-center rounded border border-gray-200 hover:border-primary hover:text-primary transition-all">
                  <i class="fas fa-chevron-right text-xs"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  
  <div id="feeModal" class="modal-overlay"></div>
  <div id="batchFeeModal" class="modal-overlay"></div>
  <div id="detailModal" class="modal-overlay"></div>
  <div id="mermaidModal" class="mermaid-modal"></div>
  
  <script>
    if (typeof initAll !== 'undefined') {
      initAll();
    }
  </script>
  <script src="js/main.js"></script>
</body>
</html>
