<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>员工绩效评价 - 列表视图</title>
  <!-- 引入Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <!-- 配置Tailwind自定义颜色和字体 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
            secondary: '#FF7D00',
            danger: '#F53F3F',
            neutral: {
              100: '#F5F7FA',
              200: '#E5E6EB',
              300: '#C9CDD4',
              400: '#86909C',
              500: '#4E5969',
              600: '#272E3B',
              700: '#1D2129',
            }
          },
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      }
    }
  </script>
  
  <!-- 自定义工具类 -->
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .list-shadow {
        @apply shadow-md hover:shadow-lg transition-shadow duration-300;
      }
      .btn-primary {
        @apply bg-primary hover:bg-primary/90 text-white font-medium py-2 px-5 rounded-lg transition-all duration-300 transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-primary/50;
      }
      .btn-secondary {
        @apply bg-white border border-primary text-primary hover:bg-primary/5 font-medium py-2 px-5 rounded-lg transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-primary/30;
      }
      .btn-disabled {
        @apply bg-neutral-200 text-neutral-400 cursor-not-allowed py-2 px-5 rounded-lg;
      }
      .section-transition {
        @apply transition-all duration-300 ease-in-out;
      }
      .slider-thumb {
        @apply appearance-none w-5 h-5 rounded-full bg-secondary cursor-pointer shadow-md;
      }
      .slider-track {
        @apply appearance-none h-2 rounded-full bg-neutral-200;
      }
      /* 滑块样式优化 - 确保所有浏览器中显示一致 */
      .rating-slider {
        @apply appearance-none;
        width: 100%;
        height: 8px;
        background: transparent;
        outline: none;
        margin: 0;
      }
      .rating-slider::-webkit-slider-thumb {
        @apply appearance-none w-5 h-5 rounded-full bg-secondary cursor-pointer shadow-md;
        -webkit-appearance: none;
        appearance: none;
        margin-top: -6px;
      }
      .rating-slider::-moz-range-thumb {
        @apply w-5 h-5 rounded-full bg-secondary cursor-pointer border-none shadow-md;
        margin-top: -6px;
      }
      .rating-slider::-webkit-slider-runnable-track {
        @apply appearance-none h-2 rounded-full bg-neutral-200;
        -webkit-appearance: none;
        width: 100%;
        height: 8px;
        cursor: pointer;
      }
      .rating-slider::-moz-range-track {
        @apply h-2 rounded-full bg-neutral-200 border-none;
        width: 100%;
        height: 8px;
        cursor: pointer;
        background: #e5e7eb;
      }
      /* Firefox-specific fix for vertical alignment */
      @-moz-document url-prefix() {
        .rating-slider {
          height: 22px;
        }
        .rating-slider::-moz-range-thumb {
          margin-top: 0;
        }
      }
      .required-indicator {
        @apply text-danger text-xs ml-1;
      }
      .field-error {
        @apply border-danger focus:ring-danger/50 focus:border-danger;
      }
      .error-message {
        @apply text-danger text-xs mt-1 flex items-center;
      }
    }
  </style>
</head>
<body class="font-inter bg-neutral-100 text-neutral-700 min-h-screen">
  <!-- 顶部导航栏 - 滚动时固定 -->
  <header class="bg-white shadow-sm sticky top-0 z-30">
    <div class="container mx-auto px-4">
      <div class="flex flex-col md:flex-row md:items-center justify-between py-4">
        <div>
          <h1 class="text-xl md:text-2xl font-bold text-neutral-700">员工绩效评价</h1>
          <p class="text-sm text-neutral-500 mt-1">请为以下员工进行评分评价</p>
        </div>
        <div class="flex items-center mt-4 md:mt-0 flex-wrap gap-2">
          <div class="relative w-full md:w-auto mr-0 md:mr-4">
            <input type="text" id="searchInput" placeholder="搜索员工姓名或部门..." 
                  class="pl-10 pr-4 py-2 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all w-full md:w-64">
            <i class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-neutral-400"></i>
          </div>
          <button id="expandAllBtn" class="btn-secondary text-sm">
            <i class="fa fa-plus-square-o mr-1"></i>全部展开
          </button>
          <button id="collapseAllBtn" class="btn-secondary text-sm">
            <i class="fa fa-minus-square-o mr-1"></i>全部折叠
          </button>
          <button id="submitAllBtn" class="btn-disabled text-sm" disabled>
            <i class="fa fa-paper-plane mr-1"></i>提交评价
          </button>

          <!-- <a href="/mobile-editor" target="_blank" class="btn-secondary text-sm">
            <i class="fa fa-mobile mr-1"></i>移动端
          </a> -->
        </div>
      </div>
    </div>
  </header>
  
  <!-- 页面容器 -->
  <div class="container mx-auto px-4 py-6 max-w-6xl">
    

    
    <!-- 评价说明 -->
    <div class="bg-white rounded-xl p-4 md:p-6 list-shadow mb-6">
      <div class="flex items-start">
        <!-- <i class="fa fa-info-circle text-primary mt-1 mr-3 text-lg"></i> -->
        <div>
          <h2 class="text-lg font-semibold mb-2 text-neutral-700">评价说明</h2>
          <ul class="space-y-1 text-sm text-neutral-500">
            <li class="flex items-start">
              <i class="fa fa-check-circle text-primary/70 mt-0.5 mr-2 text-xs"></i>
              <span>请根据实际表现对每位员工进行客观评价</span>
            </li>
            <li class="flex items-start">
              <i class="fa fa-check-circle text-primary/70 mt-0.5 mr-2 text-xs"></i>
              <span>评分范围为0-10分，可通过拖拽进度条进行评分</span>
            </li>
            <li class="flex items-start">
              <i class="fa fa-check-circle text-primary/70 mt-0.5 mr-2 text-xs"></i>
              <span>评分低于5分时，备注为必填项</span>
            </li>
            <!-- <li class="flex items-start">
              <i class="fa fa-check-circle text-primary/70 mt-0.5 mr-2 text-xs"></i>
              <span>所有评价内容将严格保密，请放心填写</span>
            </li> -->
          </ul>
        </div>
      </div>
    </div>
    
    <!-- 筛选器 -->
    <div class="bg-white rounded-xl p-4 md:p-6 list-shadow mb-6 filter-container">
      <div class="flex flex-wrap items-center gap-3">
        <span class="text-sm text-neutral-500">部门筛选：</span>
        <button class="filter-btn px-3 py-1 rounded-full bg-primary text-white text-sm">全部</button>
        <button class="filter-btn px-3 py-1 rounded-full bg-neutral-100 hover:bg-neutral-200 text-neutral-600 text-sm transition-colors">头程客服部</button>
        <button class="filter-btn px-3 py-1 rounded-full bg-neutral-100 hover:bg-neutral-200 text-neutral-600 text-sm transition-colors">海外仓客服部</button>
        <button class="filter-btn px-3 py-1 rounded-full bg-neutral-100 hover:bg-neutral-200 text-neutral-600 text-sm transition-colors">对仓服务部</button>
        <button class="filter-btn px-3 py-1 rounded-full bg-neutral-100 hover:bg-neutral-200 text-neutral-600 text-sm transition-colors">海外运营部</button>
        <button class="filter-btn px-3 py-1 rounded-full bg-neutral-100 hover:bg-neutral-200 text-neutral-600 text-sm transition-colors">清关组</button>
        <button class="filter-btn px-3 py-1 rounded-full bg-neutral-100 hover:bg-neutral-200 text-neutral-600 text-sm transition-colors">数据组</button>
      </div>
    </div>
    
    <!-- 评价列表表单 -->
    <form id="evaluationForm" class="space-y-4">
      <!-- 动态内容将通过Python后端生成 -->
      <!-- 被评人模板 (前端用于克隆，实际由后端生成) -->
      <div id="employeeTemplate" class="hidden">
        <div class="evaluation-item bg-white rounded-xl overflow-hidden list-shadow" data-employee-id="__ID__">
          <!-- 列表项头部 - 可点击展开/折叠 -->
          <div class="evaluation-header p-4 md:p-5 flex flex-col md:flex-row md:items-center justify-between cursor-pointer">
            <div class="flex items-center w-full md:w-auto">
              <div class="min-w-0">
                <h3 class="font-bold text-neutral-700 truncate">__NAME__</h3>
                <p class="text-sm text-neutral-500">__DEPARTMENT__ · __POSITION__</p>
              </div>
            </div>
            <div class="flex items-center mt-3 md:mt-0">
              <div class="flex items-center mr-4">
                <span class="evaluation-status text-sm px-2 py-1 rounded-full bg-neutral-100 text-neutral-500">未评价</span>
              </div>
              <button type="button" class="clear-evaluation-btn text-xs text-neutral-500 hover:text-danger mr-3 py-1 px-2 transition-colors" title="清空评价">
                <i class="fa fa-eraser mr-1"></i>清空
              </button>
              <div class="expand-icon transition-transform duration-300">
                <i class="fa fa-chevron-down text-neutral-400"></i>
              </div>
            </div>
          </div>
          
          <!-- 列表项内容 - 评分项 -->
          <div class="evaluation-content px-4 md:px-5 pb-5 hidden section-transition">
            <div class="pt-2 border-t border-neutral-100 space-y-5">
              <!-- 评分项将通过后端动态生成 -->
        
              <!-- 单项提交按钮已移除 -->
            </div>
          </div>
        </div>
      </div>
      
      <!-- 评分项模板 (前端用于克隆，实际由后端生成) -->
      <div id="ratingItemTemplate" class="hidden">
        <div class="rating-item" data-rating-id="__RATING_ID__">
          <div class="flex flex-col md:flex-row md:items-center justify-between mb-2">
            <label class="font-medium text-neutral-700 mb-2 md:mb-0">
              __RATING_TITLE__
              <span class="comment-required required-indicator hidden">*</span>
            </label>
            <div class="flex items-center w-full md:w-1/2">
              <input type="range" min="0" max="10" step="0.5" value="" class="rating-slider slider-track w-full mr-3" data-for="rating___ID___RATING_ID__">
              <span class="rating-value text-sm font-medium text-neutral-700 min-w-[3rem] text-center">未评分</span>
              <input type="hidden" name="rating___ID___RATING_ID__" class="rating-input">
            </div>
          </div>
          <div class="flex items-center text-xs text-neutral-500 mb-2">
            <button type="button" class="rating-description-btn text-primary flex items-center">
              <i class="fa fa-info-circle mr-1"></i>
              <span>评分说明</span>
            </button>
            <span class="rating-description-content hidden">__RATING_DESCRIPTION__</span>
          </div>
          <textarea name="comment___ID___RATING_ID__" rows="2" class="comment-textarea w-full px-3 py-2 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-sm" placeholder="请输入具体评价（可选）"></textarea>
          <div class="comment-error error-message hidden">
            <!-- <span>评分低于5分，请填写评价说明原因</span> -->
          </div>
        </div>
      </div>
      
      <!-- 评价数据将由后端动态生成 -->
      <div id="loadingIndicator" class="text-center py-12 text-neutral-500">
        <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-primary mx-auto mb-4"></div>
        <p>正在加载评价数据...</p>
      </div>
    </form>
    
    <!-- 底部批量操作按钮 -->
    <!-- <div class="flex justify-center mt-8 mb-12">
      <button id="submitAllBtn" class="btn-disabled" disabled>
        <i class="fa fa-paper-plane mr-1"></i>提交评价
      </button>
    </div> -->
  </div>
  
  <script>
    // 全局数据存储
    let globalData = {
      employees: {},
      ratingItems: {},
      employeeRatingRelations: {},
      evaluationResults: {},
      // 保存功能已移除，不再需要缓存
    };
    
    // 保存缓存数据功能已移除
    
    // 自定义提示弹窗组件
    function showToast(message, type = 'info') {
      // 移除已有的toast
      const existingToast = document.querySelector('.custom-toast');
      if (existingToast) existingToast.remove();
      
      // 创建新的toast元素
      const toast = document.createElement('div');
      toast.className = `custom-toast fixed top-4 right-4 px-4 py-3 rounded-lg shadow-lg z-50 transition-all duration-300 ease-in-out transform translate-y-0 opacity-90`;
      
      // 根据类型设置样式
      if (type === 'success') {
        toast.classList.add('bg-green-500', 'text-white');
      } else if (type === 'error') {
        toast.classList.add('bg-red-500', 'text-white');
      } else if (type === 'warning') {
        toast.classList.add('bg-yellow-500', 'text-white');
      } else {
        toast.classList.add('bg-blue-500', 'text-white');
      }
      
      toast.innerHTML = `
        <div class="flex items-center justify-between">
          <span>${message}</span>
          <button class="ml-2 text-white opacity-70 hover:opacity-100">
            <i class="fa fa-times"></i>
          </button>
        </div>
      `;
      
      document.body.appendChild(toast);
      
      // 添加关闭事件
      toast.querySelector('button').addEventListener('click', () => {
        toast.classList.add('opacity-0', 'translate-y-[-20px]');
        setTimeout(() => toast.remove(), 300);
      });
      
      // 自动关闭
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-[-20px]');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
    
    // 描述弹窗
    function showRatingDescriptionDialog(title, description) {
      // 移除已有的对话框
      const existingDialog = document.querySelector('.rating-description-dialog');
      if (existingDialog) existingDialog.remove();
      
      // 创建对话框遮罩
      const dialogOverlay = document.createElement('div');
      dialogOverlay.className = 'rating-description-dialog fixed inset-0 bg-black/30 flex items-center justify-center z-50 transition-opacity duration-300 opacity-100';
      
      // 创建对话框内容
      const dialogContent = document.createElement('div');
      dialogContent.className = 'bg-white rounded-xl shadow-xl p-6 max-w-md w-full mx-4 transform transition-all duration-300 scale-100';
      
      // 基础HTML
      let dialogHTML = `
        <h3 class="text-lg font-bold text-neutral-800 mb-3">${title}</h3>
        <div class="text-neutral-600 mb-5 p-4 bg-neutral-50 rounded-lg">
          ${description}
        </div>
        <div class="flex justify-center">
          <button class="close-btn px-6 py-2 bg-primary hover:bg-primary/90 text-white rounded-lg transition-colors">
            我知道了
          </button>
        </div>
      `;
      
      dialogContent.innerHTML = dialogHTML;
      dialogOverlay.appendChild(dialogContent);
      document.body.appendChild(dialogOverlay);
      
      // 获取元素
      const closeBtn = dialogContent.querySelector('.close-btn');
      
      // 关闭按钮事件
      closeBtn.addEventListener('click', () => {
        dialogOverlay.classList.add('opacity-0');
        dialogContent.classList.add('scale-95');
        setTimeout(() => {
          dialogOverlay.remove();
        }, 300);
      });
      
      // 点击遮罩关闭
      dialogOverlay.addEventListener('click', (e) => {
        if (e.target === dialogOverlay) {
          dialogOverlay.classList.add('opacity-0');
          dialogContent.classList.add('scale-95');
          setTimeout(() => {
            dialogOverlay.remove();
          }, 300);
        }
      });
    }
    
    // 确认对话框
    function showConfirmDialog(message, onConfirm, onCancel, options = {}) {
      // 移除已有的对话框
      const existingDialog = document.querySelector('.custom-confirm-dialog');
      if (existingDialog) existingDialog.remove();
      
      // 创建对话框遮罩
      const dialogOverlay = document.createElement('div');
      dialogOverlay.className = 'custom-confirm-dialog fixed inset-0 bg-black/30 flex items-center justify-center z-50 transition-opacity duration-300 opacity-100';
      
      // 创建对话框内容
      const dialogContent = document.createElement('div');
      dialogContent.className = 'bg-white rounded-xl shadow-xl p-6 max-w-md w-full mx-4 transform transition-all duration-300 scale-100';
      
      // 基础HTML
      let dialogHTML = `
        <h3 class="text-lg font-bold text-neutral-800 mb-3">确认操作</h3>
        <p class="text-neutral-600 mb-4">${message}</p>
      `;
      
      // 如果是提交评价操作，添加评价人输入框
      if (options.type === 'submit-evaluation') {
        dialogHTML += `
          <div class="mb-4">
            <label for="evaluatorName" class="block text-sm font-medium text-neutral-700 mb-1">评价人姓名 <span class="text-danger">*</span></label>
            <input type="text" id="evaluatorName" placeholder="请输入您的姓名" 
                  class="w-full px-3 py-2 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all">
            <p id="evaluatorNameError" class="error-message hidden">
              评价人姓名不能为空
            </p>
          </div>
        `;
      }
      
      // 添加按钮
      dialogHTML += `
        <div class="flex justify-end space-x-3">
          <button class="cancel-btn px-4 py-2 bg-neutral-200 hover:bg-neutral-300 text-neutral-800 rounded-lg transition-colors">取消</button>
          <button class="confirm-btn px-4 py-2 bg-primary hover:bg-primary/90 text-white rounded-lg transition-colors">确认</button>
        </div>
      `;
      
      dialogContent.innerHTML = dialogHTML;
      dialogOverlay.appendChild(dialogContent);
      document.body.appendChild(dialogOverlay);
      
      // 获取元素
      const evaluatorNameInput = dialogContent.querySelector('#evaluatorName');
      const evaluatorNameError = dialogContent.querySelector('#evaluatorNameError');
      const cancelBtn = dialogContent.querySelector('.cancel-btn');
      const confirmBtn = dialogContent.querySelector('.confirm-btn');
      
      // 添加输入验证
      if (evaluatorNameInput) {
        evaluatorNameInput.addEventListener('input', function() {
          if (this.value.trim()) {
            this.classList.remove('field-error');
            if (evaluatorNameError) evaluatorNameError.classList.add('hidden');
          }
        });
      }
      
      // 取消按钮事件
      cancelBtn.addEventListener('click', () => {
        dialogOverlay.classList.add('opacity-0');
        dialogContent.classList.add('scale-95');
        setTimeout(() => {
          dialogOverlay.remove();
          if (onCancel) onCancel();
        }, 300);
      });
      
      // 确认按钮事件
      confirmBtn.addEventListener('click', () => {
        // 如果有评价人输入框，进行验证
        if (evaluatorNameInput) {
          if (!evaluatorNameInput.value.trim()) {
            evaluatorNameInput.classList.add('field-error');
            if (evaluatorNameError) evaluatorNameError.classList.remove('hidden');
            return; // 阻止提交
          }
        }
        
        // 获取评价人姓名
        const evaluatorName = evaluatorNameInput ? evaluatorNameInput.value.trim() : '';
        
        dialogOverlay.classList.add('opacity-0');
        dialogContent.classList.add('scale-95');
        setTimeout(() => {
          dialogOverlay.remove();
          if (onConfirm) onConfirm(evaluatorName);
        }, 300);
      });
    }
    
    // 初始化滑块样式
    document.addEventListener('DOMContentLoaded', function() {
      // 加载所有数据
      loadAllData().then(() => {
        // 渲染评价列表
        renderEvaluationList();
        
        // 初始化滑块样式
        initSliders();
        
        // 初始化展开/折叠功能
        initExpandCollapse();
        
        // 初始化评分事件监听
        initRatingEvents();
        
        // 初始化表单验证
        initFormValidation();
        
        // 初始化搜索功能
        initSearch();
        
        // 初始化筛选按钮
        initFilterButtons();
        
        // 初始化清空评价按钮
        initClearEvaluationButtons();
        
        // 初始化评论文本框事件监听
        initCommentTextareaEvents();
        
        // 初始化评分标准按钮事件
        initRatingDescriptionButtons();
      });
    });
    
    // 应用缓存的评分数据功能已移除
    
    // 完整重置页面到初始状态
    async function resetPageToInitialState() {
      // 显示加载指示器
      const loadingIndicator = document.getElementById('loadingIndicator');
      if (loadingIndicator) {
        loadingIndicator.classList.remove('hidden');
      }
      
      try {
        // 重新加载所有数据
        await loadAllData();
        
        // 重新渲染评价列表
        renderEvaluationList();
        
        // 重新初始化所有组件
        initSliders();
        initExpandCollapse();
        initRatingEvents();
        initFormValidation();
        initSearch();
        initFilterButtons();
        initClearEvaluationButtons();
        initCommentTextareaEvents();
        
        // 重置提交按钮状态
        const submitAllBtn = document.getElementById('submitAllBtn');
        if (submitAllBtn) {
          submitAllBtn.innerHTML = '<i class="fa fa-paper-plane mr-1"></i>提交评价';
          submitAllBtn.disabled = true;
          submitAllBtn.classList.remove('btn-primary');
          submitAllBtn.classList.add('btn-disabled');
        }
      } catch (error) {
        console.error('重置页面失败:', error);
        showToast('页面重置失败，请刷新页面重试', 'error');
      } finally {
        // 隐藏加载指示器
        if (loadingIndicator) {
          loadingIndicator.classList.add('hidden');
        }
      }
    }
    
    // 加载所有数据
    async function loadAllData() {
      try {
        // 并行加载所有数据
        const [employeesRes, ratingItemsRes, relationsRes, evaluationResultsRes] = await Promise.all([
          fetch('/api/employees'),
          fetch('/api/rating-items'),
          fetch('/api/employee-rating-relations'),
          fetch('/api/evaluation-results')
        ]);
        
        if (!employeesRes.ok || !ratingItemsRes.ok || !relationsRes.ok || !evaluationResultsRes.ok) {
          throw new Error('获取数据失败');
        }
        
        globalData.employees = await employeesRes.json();
        globalData.ratingItems = await ratingItemsRes.json();
        globalData.employeeRatingRelations = await relationsRes.json();
        globalData.evaluationResults = await evaluationResultsRes.json();
        
      } catch (error) {

    // 渲染评价列表
    function renderEvaluationList() {
      const evaluationForm = document.getElementById('evaluationForm');
      
      // 清空现有内容，但保留模板
      const employeeTemplate = document.getElementById('employeeTemplate');
      const ratingItemTemplate = document.getElementById('ratingItemTemplate');
      
      // 移除除了模板外的所有评价项
      const itemsToRemove = [];
      for (let i = 0; i < evaluationForm.children.length; i++) {
        const child = evaluationForm.children[i];
        if (child.id !== 'employeeTemplate' && child.id !== 'ratingItemTemplate') {
          itemsToRemove.push(child);
        }
      }
      
      itemsToRemove.forEach(item => item.remove());
      
      // 遍历员工数据
      Object.keys(globalData.employees).forEach(employeeId => {
        const employee = globalData.employees[employeeId];
        
        // 克隆员工模板
        const employeeItem = employeeTemplate.cloneNode(true);
        employeeItem.removeAttribute('id');
        employeeItem.classList.remove('hidden');
        employeeItem.setAttribute('data-employee-id', employeeId);
        
        // 替换员工信息
        const namePlaceholder = employeeItem.querySelector('h3');
        namePlaceholder.textContent = employee.name;
        
        const deptPlaceholder = employeeItem.querySelector('p');
        deptPlaceholder.textContent = `${employee.department} · 员工`;
        
        // 替换表单字段的ID和名称
        const textareas = employeeItem.querySelectorAll('textarea, input[type="hidden"]');
        textareas.forEach(textarea => {
          if (textarea.name) {
            textarea.name = textarea.name.replace('__ID__', employeeId);
          }
        });
        
        // 安全检查：由于已删除保存按钮功能，仅在按钮存在时才设置属性
        const saveButton = employeeItem.querySelector('.save-individual');
        if (saveButton) {
          saveButton.setAttribute('data-id', employeeId);
        }
        
        // 获取该员工关联的评分项
        const relatedRatingIds = globalData.employeeRatingRelations[employeeId] || [];
        
        // 获取评分项容器
        const ratingItemsContainer = employeeItem.querySelector('.pt-2.border-t.border-neutral-100.space-y-5');
        
        // 清除模板中的评分项（保留总体评价和保存按钮）
        const elementsToRemove = [];
        for (let i = 0; i < ratingItemsContainer.children.length; i++) {
          const child = ratingItemsContainer.children[i];
          if (child.classList.contains('rating-item') || child.textContent.includes('__RATING_ITEMS__')) {
            elementsToRemove.push(child);
          }
        }
        
        elementsToRemove.forEach(item => item.remove());
        
        // 插入评分项
        const overallCommentSection = employeeItem.querySelector('.mt-4.pt-4.border-t.border-neutral-100');
        
        relatedRatingIds.forEach(ratingId => {
          const ratingItem = globalData.ratingItems[ratingId.toString()];
          if (ratingItem && ratingItem.enabled) {
            // 克隆评分项模板
            const newRatingItem = ratingItemTemplate.cloneNode(true);
            newRatingItem.removeAttribute('id');
            newRatingItem.classList.remove('hidden');
            newRatingItem.setAttribute('data-rating-id', ratingId);
            
            // 替换评分项信息
            const titlePlaceholder = newRatingItem.querySelector('label.font-medium');
            titlePlaceholder.innerHTML = titlePlaceholder.innerHTML.replace('__RATING_TITLE__', ratingItem.name);
            
            // 替换评分描述内容
            const descPlaceholder = newRatingItem.querySelector('.rating-description-content');
            descPlaceholder.textContent = ratingItem.description;
            
            // 替换表单字段的ID和名称
            const slider = newRatingItem.querySelector('.rating-slider');
            slider.setAttribute('data-for', `rating_${employeeId}_${ratingId}`);
            
            const hiddenInput = newRatingItem.querySelector('.rating-input');
            hiddenInput.name = `rating_${employeeId}_${ratingId}`;
            
            const commentTextarea = newRatingItem.querySelector('.comment-textarea');
            commentTextarea.name = `comment_${employeeId}_${ratingId}`;
            
            // 插入到总体评价之前
            ratingItemsContainer.insertBefore(newRatingItem, overallCommentSection);
          }
        });
        
        // 添加到表单
        evaluationForm.appendChild(employeeItem);
      });
    }
    
    // 收集员工评价数据
    function collectEmployeeEvaluationData(employeeId, evaluatorName = '匿名评价人') {
      // 安全检查
      if (!employeeId) {
        console.error('Missing employeeId in collectEmployeeEvaluationData');
        return { rating_details: {} };
      }
      
      const employee = globalData.employees && globalData.employees[employeeId];
      const evaluationData = {
        employee_id: employeeId,
        employee_name: employee ? employee.name : '未知员工',
        employee_department: employee ? employee.department : '未知部门',
        evaluator_name: evaluatorName,
        rating_details: {},
        created_at: new Date().toISOString(),
        status: 'draft'
      };
      
      // 收集评分详情
      const relatedRatingIds = globalData.employeeRatingRelations && globalData.employeeRatingRelations[employeeId] || [];
      relatedRatingIds.forEach(ratingId => {
        const ratingInput = document.querySelector(`input[name="rating_${employeeId}_${ratingId}"]`);
        const commentTextarea = document.querySelector(`textarea[name="comment_${employeeId}_${ratingId}"]`);
        
        if (ratingInput && ratingInput.value) {
          evaluationData.rating_details[ratingId] = {
            score: parseFloat(ratingInput.value),
            comment: commentTextarea ? commentTextarea.value : ''
          };
        }
      });
    
      return evaluationData;
    }
    
    function initSliders() {
      const sliders = document.querySelectorAll('.rating-slider');
      sliders.forEach(slider => {
        // 保留原有样式设置...
        
        // 初始化滑块显示（空值处理）
        const valueDisplay = slider.nextElementSibling;
        const hiddenInput = slider.parentElement.querySelector('.rating-input');
        
        // 设置滑块默认在0分位置（左侧），但显示"未评分"
        slider.value = '0';
        if (valueDisplay) valueDisplay.textContent = '未评分';
        if (hiddenInput) hiddenInput.value = '';

        // 更新滑块输入事件
        slider.oninput = function() {
          const valueDisplay = this.nextElementSibling;
          const hiddenInput = this.parentElement.querySelector('.rating-input');
          
          // 有值时显示分数，空值时显示未评分
          if (this.value) {
            if (valueDisplay) valueDisplay.textContent = this.value + '分';
            if (hiddenInput) hiddenInput.value = this.value;
          } else {
            if (valueDisplay) valueDisplay.textContent = '未评分';
            if (hiddenInput) hiddenInput.value = '';
          }
          
          handleLowScoreRequired(this);
          checkButtonStates();
          updateEmployeeEvaluationStatus(this.closest('.evaluation-item'));
        };
      });
    }
    
    // 更新员工评价状态
    function updateEmployeeEvaluationStatus(employeeItem) {
      if (!employeeItem) return;
      
      const statusElement = employeeItem.querySelector('.evaluation-status');
      if (!statusElement) return;
      
      const sliders = employeeItem.querySelectorAll('.rating-slider');
      const textareas = employeeItem.querySelectorAll('textarea');
      
      // 检查是否有任何评分或评论数据
      let hasRatingOrComment = false;
      
      // 检查是否有评分
      sliders.forEach(slider => {
        if (parseFloat(slider.value) > 0) {
          hasRatingOrComment = true;
        }
      });
      
      // 检查是否有评论
      textareas.forEach(textarea => {
        if (textarea.value && textarea.value.trim() !== '') {
          hasRatingOrComment = true;
        }
      });
      
      // 根据结果更新状态
      if (hasRatingOrComment) {
        statusElement.className = 'evaluation-status text-sm px-2 py-1 rounded-full bg-green-100 text-green-600';
        statusElement.textContent = '已评价';
      } else {
        statusElement.className = 'evaluation-status text-sm px-2 py-1 rounded-full bg-neutral-100 text-neutral-500';
        statusElement.textContent = '未评价';
      }
    }
    
    // 初始化展开/折叠功能
    function initExpandCollapse() {
      // 单个项目展开/折叠
      const headers = document.querySelectorAll('.evaluation-header');
      headers.forEach(header => {
        header.addEventListener('click', function() {
          const content = this.nextElementSibling;
          const icon = this.querySelector('.expand-icon i');
          
          if (content) content.classList.toggle('hidden');
          if (icon) icon.classList.toggle('rotate-180');
        });
      });
      
      // 全部展开
      const expandAllBtn = document.getElementById('expandAllBtn');
      if (expandAllBtn) {
        expandAllBtn.addEventListener('click', function() {
          document.querySelectorAll('.evaluation-content.hidden').forEach(content => {
            content.classList.remove('hidden');
            const previousElement = content.previousElementSibling;
            if (previousElement) {
              const icon = previousElement.querySelector('.expand-icon i');
              if (icon) icon.classList.add('rotate-180');
            }
          });
        });
      }
      
      // 全部折叠
      const collapseAllBtn = document.getElementById('collapseAllBtn');
      if (collapseAllBtn) {
        collapseAllBtn.addEventListener('click', function() {
          document.querySelectorAll('.evaluation-content:not(.hidden)').forEach(content => {
            content.classList.add('hidden');
            const previousElement = content.previousElementSibling;
            if (previousElement) {

              if (icon) icon.classList.remove('rotate-180');

    // 初始化评分事件监听
    function initRatingEvents() {
      // 监听文本框输入，更新保存按钮状态
      document.querySelectorAll('textarea').forEach(textarea => {
        textarea.addEventListener('input', function() {
          checkButtonStates();
          
          // 如果是必填项，检查是否已填写
          if (this.classList.contains('comment-textarea')) {
            const ratingItem = this.closest('.rating-item');
            if (ratingItem) {
              const requiredIndicator = ratingItem.querySelector('.comment-required');
              if (requiredIndicator && !requiredIndicator.classList.contains('hidden')) {
                validateCommentField(this);
              }
            }
          }
          
        });

    // 处理低分必填逻辑
    function handleLowScoreRequired(slider) {
      const ratingValue = parseFloat(slider.value);
      const ratingItem = slider.closest('.rating-item');
      
      if (!ratingItem) return;
      
      const commentTextarea = ratingItem.querySelector('.comment-textarea');
      const requiredIndicator = ratingItem.querySelector('.comment-required');
      const errorMessage = ratingItem.querySelector('.comment-error');
      
      // 检查是否是0分或低于5分
      if (ratingValue === 0 || (ratingValue > 0 && ratingValue < 5)) {
        // 显示必填标识
        if (requiredIndicator) requiredIndicator.classList.remove('hidden');
        
        // 验证是否已填写
        if (commentTextarea) validateCommentField(commentTextarea);
      } else {
        // 隐藏必填标识和错误信息
        if (requiredIndicator) requiredIndicator.classList.add('hidden');
        if (errorMessage) errorMessage.classList.add('hidden');
        if (commentTextarea) commentTextarea.classList.remove('field-error');
      }
      
      // 检查总体评价是否需要必填
      const employeeItem = slider.closest('.evaluation-item');
      if (employeeItem) checkOverallCommentRequired(employeeItem);
    }
    
    // 检查总体评价是否需要必填
    function checkOverallCommentRequired(employeeItem) {
      if (!employeeItem) return;
      
      const sliders = employeeItem.querySelectorAll('.rating-slider');
      let hasLowScore = false;
      
      // 检查是否有任何评分是0分或低于5分
      sliders.forEach(slider => {
        if (parseFloat(slider.value) === 0 || (parseFloat(slider.value) > 0 && parseFloat(slider.value) < 5)) {
          hasLowScore = true;
        }
      });
      
      const overallComment = employeeItem.querySelector('.overall-comment');
      const requiredIndicator = employeeItem.querySelector('.overall-comment-required');
      const errorElement = employeeItem.querySelector('.overall-comment-error');
      
      if (hasLowScore) {
        if (requiredIndicator) requiredIndicator.classList.remove('hidden');
        if (overallComment) validateOverallComment(overallComment);
      } else {
        if (requiredIndicator) requiredIndicator.classList.add('hidden');
        if (errorElement) errorElement.classList.add('hidden');
        if (overallComment) overallComment.classList.remove('field-error');
      }
    }
    
    // 验证评论字段
    function validateCommentField(textarea) {
      if (!textarea) return true;
      
      const ratingItem = textarea.closest('.rating-item');
      if (!ratingItem) return true;
      
      const errorMessage = ratingItem.querySelector('.comment-error');
      const requiredIndicator = ratingItem.querySelector('.comment-required');
      
      // 安全检查必填状态
      const isRequired = requiredIndicator && !requiredIndicator.classList.contains('hidden');
      
      if (isRequired && (!textarea.value || textarea.value.trim() === '')) {
        textarea.classList.add('field-error');
        if (errorMessage) errorMessage.classList.remove('hidden');
        return false;
      } else {
        textarea.classList.remove('field-error');
        if (errorMessage) errorMessage.classList.add('hidden');
        return true;
      }
    }
    
    // 初始化评分标准按钮事件监听
    function initRatingDescriptionButtons() {
      const descriptionButtons = document.querySelectorAll('.rating-description-btn');
      descriptionButtons.forEach(button => {
        button.addEventListener('click', function() {
          const ratingItem = this.closest('.rating-item');
          if (!ratingItem) return;

          const descriptionElement = ratingItem.querySelector('.rating-description-content');
          const description = descriptionElement ? descriptionElement.textContent.trim() : '';

          // 从评分项的 label 中提取评分项目名称，避免出现只显示“评分说明”的情况
          let ratingName = '评分说明';
          const labelEl = ratingItem.querySelector('label.font-medium');
          if (labelEl) {
            // 优先取第一个非空文本节点（一般是“工作态度”“沟通能力”等标题）
            const firstTextNode = Array.from(labelEl.childNodes).find(
              node => node.nodeType === Node.TEXT_NODE && node.textContent.trim() !== ''
            );
            if (firstTextNode) {
              ratingName = firstTextNode.textContent.trim();
            } else {
              ratingName = labelEl.textContent.trim();
            }
          }

          // 弹窗标题为评分项名称，内容为评分项描述
          showRatingDescriptionDialog(ratingName, description);
        });
      });
    }
    
    // 验证总体评价
    function validateOverallComment(textarea) {
      if (!textarea) return true;
      
      const employeeItem = textarea.closest('.evaluation-item');
      if (!employeeItem) return true;
      
      const errorMessage = employeeItem.querySelector('.overall-comment-error');
      const requiredIndicator = employeeItem.querySelector('.overall-comment-required');
      
      // 安全检查必填状态
      const isRequired = requiredIndicator && !requiredIndicator.classList.contains('hidden');
      
      if (isRequired && (!textarea.value || textarea.value.trim() === '')) {
        textarea.classList.add('field-error');
        if (errorMessage) errorMessage.classList.remove('hidden');
        return false;
      } else {
        textarea.classList.remove('field-error');
        if (errorMessage) errorMessage.classList.add('hidden');
        return true;
      }
    }
    
    // 检查按钮状态 - 简化版，只更新提交按钮状态
    function checkButtonStates() {

      updateAllButtonsState();
    }
    
    // 更新全部按钮状态
    function updateAllButtonsState() {
      const submitAllBtn = document.getElementById('submitAllBtn');
      
      // 安全检查
      if (!submitAllBtn) return;
      
      // 检查是否有任何评分或评论数据可以提交
      let canSubmit = false;
      
      document.querySelectorAll('.evaluation-item').forEach(employeeItem => {
        const sliders = employeeItem.querySelectorAll('.rating-slider');
        const textareas = employeeItem.querySelectorAll('textarea');
        
        // 检查是否有评分
        sliders.forEach(slider => {
          if (parseFloat(slider.value) > 0) {
            canSubmit = true;
          }
        });
        
        // 检查是否有评论
        textareas.forEach(textarea => {

            canSubmit = true;

    // 初始化表单验证
    function initFormValidation() {
      
      // 提交全部按钮事件
      const submitAllBtn = document.getElementById('submitAllBtn');
      if (submitAllBtn) {
        submitAllBtn.addEventListener('click', function() {
            // 提交前检查是否有低分项未填写备注
            let hasLowScoreWithoutComment = false;
            
            document.querySelectorAll('.evaluation-item').forEach(employeeItem => {
              const ratingItems = employeeItem.querySelectorAll('.rating-item');
              
              ratingItems.forEach(ratingItem => {
                const hiddenInput = ratingItem.querySelector('.rating-input');
                const ratingValue = hiddenInput && hiddenInput.value ? parseFloat(hiddenInput.value) : 0;
                const commentTextarea = ratingItem.querySelector('.comment-textarea');
                
                // 检查是否是低分项且有评分
                if (ratingValue !== 0 && ratingValue < 5) {
                  // 检查备注是否为空
                  if (!commentTextarea || !commentTextarea.value || commentTextarea.value.trim() === '') {
                    hasLowScoreWithoutComment = true;
                  }
                }
              });
            });
            
            if (hasLowScoreWithoutComment) {
              showToast('存在低分项未填写备注', 'warning');
              return;
            }
            
            showConfirmDialog(
              '确定要提交所有评价吗？提交后将重置所有评分。',
              (evaluatorName) => {
                const buttonRef = this;
                buttonRef.innerHTML = '<i class="fa fa-spinner fa-spin mr-1"></i>提交中...';
                buttonRef.disabled = true;
                
                // 直接收集所有当前页面数据进行提交
                const allEvaluations = [];
                
                if (globalData.employees) {
                  Object.keys(globalData.employees).forEach(employeeId => {
                    const evaluationData = collectEmployeeEvaluationData(employeeId, evaluatorName || '匿名评价人');
                    // 只提交有评分的数据
                    if (evaluationData && evaluationData.rating_details && Object.keys(evaluationData.rating_details).length > 0) {
                      allEvaluations.push({
                        ...evaluationData,
                        status: 'submitted'
                      });
                    }
                  });
                }
                
                if (allEvaluations.length === 0) {
                  showToast('没有可提交的评价数据', 'warning');
                  buttonRef.innerHTML = '<i class="fa fa-paper-plane mr-1"></i>提交评价';
                  buttonRef.disabled = false;
                  return;
                }
                
                // 实际提交到服务器
                fetch('/api/evaluation-results/batch', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify(allEvaluations)
                })
                .then(response => {
                  if (!response.ok) {
                    throw new Error('服务器响应错误');
                  }
                  return response.json();
                })
                .then(data => {
                    if (data.success) {
                      // 完整重置页面到初始状态
                      resetPageToInitialState().then(() => {
                        showToast('所有评价已成功提交，页面已重置', 'success');
                      });
                    } else {
                      throw new Error('提交失败');
                    }
                  })
                .catch(error => {
                  console.error('提交评价失败:', error);
                  showToast('评价提交失败，请重试', 'error');
                  buttonRef.innerHTML = '<i class="fa fa-paper-plane mr-1"></i>提交评价';
                  buttonRef.disabled = false;
                })
                .finally(() => {
                  // 恢复按钮状态
                  setTimeout(() => {
                    buttonRef.innerHTML = '<i class="fa fa-paper-plane mr-1"></i>提交评价';
                    buttonRef.disabled = true;
                    buttonRef.classList.remove('btn-primary');
                    buttonRef.classList.add('btn-disabled');
                  }, 2000);
                });
              },
              null, // onCancel
              { type: 'submit-evaluation' } // options
            );
        });
      }
    }
  </script>
</body>
</html>
