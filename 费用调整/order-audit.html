<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>财务管理 - 费用调整</title>
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Font Awesome 图标 -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <!-- 引入 Mermaid 图表库 -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <!-- 引入 Marked Markdown 解析库 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
  
  <!-- Tailwind 配置 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2a3b7d',
            secondary: '#36CFC9',
            success: '#00B42A',
            warning: '#FF7D00',
            danger: '#F53F3F',
            gray: {
              100: '#F2F3F5',
              200: '#E5E6EB',
              300: '#C9CDD4',
              400: '#86909C',
              500: '#4E5969',
              600: '#272E3B',
              700: '#1D2129',
            }
          },
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .table-shadow {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .btn-hover {
        @apply transition-all duration-200 hover:shadow-md transform hover:-translate-y-0.5;
      }
      .status-dot {
        @apply w-2 h-2 rounded-full inline-block mr-2;
      }
      .erp-btn {
        @apply px-4 py-2 rounded-md font-medium transition-all duration-200;
      }
      .erp-btn-primary {
        @apply bg-primary text-white hover:bg-primary/90 btn-hover;
      }
      .erp-btn-secondary {
        @apply bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 btn-hover;
      }
      .erp-btn-danger {
        @apply bg-danger text-white hover:bg-danger/90 btn-hover;
      }
      .erp-btn-warning {
        @apply bg-warning text-white hover:bg-warning/90 btn-hover;
      }
      .form-input {
        @apply px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary;
      }
      .search-card {
        @apply bg-white rounded-lg p-4 shadow-sm mb-4;
      }
      .action-card {
        @apply bg-white rounded-lg p-4 shadow-sm mb-4;
      }
      .table-card {
        @apply bg-white rounded-lg shadow-sm overflow-hidden mb-4;
      }
      .card-title {
        @apply text-lg font-medium text-gray-900 mb-4;
      }
      .mermaid-container {
        @apply my-4 cursor-pointer;
      }
      .mermaid-hint {
        @apply text-xs text-gray-500 block text-center mt-1;
      }
    }
  </style>
</head>
<body class="bg-gray-100 font-inter text-gray-700 min-h-screen">
  <!-- 页面容器 -->
  <div class="container mx-auto px-4 py-6 max-w-[1920px]">
    <!-- 页面标题 -->
    <div class="mb-6">
      <h1 class="text-2xl font-semibold text-gray-900">费用调整</h1>
      <p class="text-gray-500 mt-1">出库单费用明细调整</p>
    </div>
    
    <!-- 搜索区域 -->
    <div class="search-card">
      <div class="flex flex-col md:flex-row gap-4 mb-4">
        <div class="flex-1">
          <label for="feeNumber" class="block text-sm font-medium text-gray-700 mb-1">出库单号</label>
          <div class="flex items-center gap-2">
            <input 
              type="text" 
              id="feeNumber" 
              class="flex-1 form-input"
              placeholder="输入出库单号查询（例如：HYNB-240126-0059）"
              value="HYNB-240126-0059"
            >
            <button id="searchBtn" class="erp-btn erp-btn-primary">
              <i class="fa fa-search mr-2"></i>搜索
            </button>
            <div class="relative">
              <button id="adjustFeeBtn" class="erp-btn erp-btn-warning flex items-center">
                <i class="fa fa-cog mr-2"></i>批量操作
                <i class="fa fa-chevron-down ml-2"></i>
              </button>
              <div id="adjustDropdown" class="absolute hidden top-full left-0 mt-1 w-48 bg-white rounded-md shadow-lg border border-gray-200 z-10">
                <div class="py-1">
                  <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-action="cover">覆盖</a>
                  <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-action="update">更新</a>
                  <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-action="accumulate">累加</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 功能按钮区域 -->
      <div class="flex flex-wrap gap-3 mb-4">
        <button id="addFeeBtn" class="erp-btn erp-btn-primary flex items-center">
          <i class="fa fa-plus mr-2"></i>新增费用项
        </button>
      </div>
      
      <!-- 长宽高和体积重信息区域 -->
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
        <div class="flex items-center mb-3">
          <i class="fa fa-cube text-blue-500 mr-2"></i>
          <h4 class="text-sm font-semibold text-blue-800">包裹尺寸信息</h4>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="flex items-center">
            <span class="text-sm text-gray-600 mr-2">长宽高:</span>
            <span id="dimensionsDisplay" class="text-sm font-medium text-gray-900">-</span>
            <span class="text-sm text-gray-500 ml-1">(cm³)</span>
          </div>
          <div class="flex items-center">
            <span class="text-sm text-gray-600 mr-2">体积重:</span>
            <span id="volumeWeightDisplay" class="text-sm font-medium text-gray-900">-</span>
            <span class="text-sm text-gray-500 ml-1">(kg)</span>
          </div>
          <div class="flex items-center">
            <span class="text-sm text-gray-600 mr-2">计费重:</span>
            <span id="chargeableWeightDisplay" class="text-sm font-medium text-gray-900">-</span>
            <span class="text-sm text-gray-500 ml-1">(kg)</span>
          </div>
        </div>
      </div>
      
      <!-- 费用明细表格 -->
      <div class="table-card">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-gray-50 text-left">
                <th class="px-4 py-3 font-medium text-gray-500">费用名称</th>
                <th class="px-4 py-3 font-medium text-gray-500">计费单位</th>
                <th class="px-4 py-3 font-medium text-gray-500">原金额</th>
                <th class="px-4 py-3 font-medium text-gray-500">新金额</th>
                <th class="px-4 py-3 font-medium text-gray-500">币别</th>
                <th class="px-4 py-3 font-medium text-gray-500">备注</th>
                <th class="px-4 py-3 font-medium text-gray-500">操作</th>
              </tr>
            </thead>
            <tbody id="feeTableBody" class="bg-white divide-y divide-gray-200">
              <!-- 表格数据将通过JS动态生成 -->
            </tbody>
          </table>
        </div>
        
        <!-- 无数据提示 -->
        <div id="emptyState" class="hidden py-16 text-center">
          <i class="fa fa-inbox text-4xl mb-2 block text-gray-400"></i>
          <p class="text-gray-500">暂无费用数据，请点击"新增费用项"添加</p>
        </div>
      </div>
      
      <!-- 逻辑说明区域 -->
      <div class="bg-white rounded shadow-sm mt-4 overflow-hidden">
        <div class="px-4 py-3 bg-gradient-to-r from-primary/5 to-primary/10 border-b border-primary/20 flex justify-between items-center cursor-pointer" onclick="togglePrdLogic('order-audit')">
          <div class="flex items-center">
            <i class="fa fa-book text-primary mr-2"></i>
            <span class="font-semibold text-primary">逻辑说明</span>
            <span class="ml-2 text-xs text-gray-500">(点击展开/收起)</span>
          </div>
          <i class="fa fa-chevron-down text-primary transition-transform" id="order-audit-logic-icon"></i>
        </div>
        <div id="order-audit-logic-content" class="hidden">
          <div class="px-4 py-4">
            <div class="flex border-b border-gray-200">
              <button class="prd-tab-btn px-4 py-2 border-b-2 border-primary text-primary font-medium" onclick="switchTab('prd', 'order-audit')">PRD文档</button>
              <button class="prd-tab-btn px-4 py-2 text-gray-500 hover:text-gray-700" onclick="switchTab('testcases', 'order-audit')">测试用例</button>
            </div>
            <div class="pt-4">
              <div id="order-audit-prd-content" class="prd-content">
                <!-- PRD内容将通过JavaScript加载 -->
              </div>
              <div id="order-audit-testcases-content" class="prd-content hidden">
                <!-- 测试用例内容将通过JavaScript加载 -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 上传文件模态框 -->
  <div id="uploadModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-lg shadow-xl max-w-3xl w-full max-h-[90vh] overflow-auto relative">
      <!-- 模态框头部 -->
      <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
        <h3 class="text-lg font-medium text-gray-900">
          <i class="fa fa-upload text-primary mr-2"></i>
          批量操作
        </h3>
        <button id="closeUploadModal" class="text-gray-400 hover:text-gray-600 transition-colors duration-200 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100">
          <i class="fa fa-times"></i>
        </button>
      </div>

    <!-- 上传说明 -->
    <div class="mt-4 p-2 rounded-lg">
      <div class="flex items-start">
        <i class="fa fa-exclamation-triangle text-danger mt-0.5 mr-2"></i>
        <div>
          <h4 class="text-sm font-medium text-danger mb-1">注意：修改后订单不支持重新计费，请谨慎操作！</h4>
        </div>
      </div>
    </div>
      <!-- 模态框内容 -->
       
      <div class="px-4 py-3">
        <!-- 上传区域 -->
        <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-primary transition-colors duration-200">
          <div class="mb-3">
            <i class="fa fa-cloud-upload text-3xl text-gray-400"></i>
          </div>
          <p class="text-gray-600 mb-2 text-sm">拖拽文件到此处或点击选择文件</p>
          <p class="text-xs text-gray-500 mb-3">支持 Excel (.xlsx, .xls) 和 CSV (.csv) 格式，文件大小不超过 10MB</p>
          <input type="file" id="fileInput" class="hidden" accept=".xlsx,.xls,.csv">
          <button id="selectFileBtn" class="erp-btn erp-btn-primary text-sm">
            <i class="fa fa-folder-open mr-1.5"></i>选择文件
          </button>
        </div>

        <!-- 已选择的文件列表 -->
        <div id="selectedFiles" class="mt-3 hidden">
          <h4 class="text-sm font-medium text-gray-700 mb-2">已选择的文件：</h4>
          <div class="space-y-2">
            <div class="flex items-center justify-between p-2 bg-gray-50 rounded-md">
              <div class="flex items-center">
                <i class="fa fa-file-excel-o text-green-600 mr-2"></i>
                <div>
                  <p class="text-sm font-medium text-gray-900" id="fileName">批量调整表.xlsx</p>
                  <p class="text-xs text-gray-500" id="fileSize">2.3 MB</p>
                </div>
              </div>
              <button id="removeFileBtn" class="text-danger hover:text-danger/80 transition-colors duration-200">
                <i class="fa fa-times-circle"></i>
              </button>
            </div>
          </div>
        </div>

      </div>

      <!-- 模态框底部 -->
      <div class="px-4 py-3 border-t border-gray-200 flex items-center justify-between">
        <div class="text-xs text-primary">
          <span id="uploadStatus">下载模板</span>
        </div>
        <div class="flex items-center gap-2">
          <button id="cancelUploadBtn" class="erp-btn erp-btn-secondary text-sm">
            取消
          </button>
          <button id="startUploadBtn" disabled
            class="erp-btn bg-gray-300 text-gray-500 cursor-not-allowed text-sm"
            title="请先选择文件">
            <i class="fa fa-upload mr-1"></i>
            开始上传
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 提示消息组件 -->
  <div id="toast" class="fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg transform translate-x-full transition-transform duration-300 z-50 flex items-center">
    <i id="toastIcon" class="mr-2 text-xl"></i>
    <span id="toastMessage"></span>
  </div>

  <!-- Mermaid图表放大预览弹窗 -->
  <div id="mermaidModal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-lg w-full max-w-4xl max-h-[90vh] flex flex-col">
      <div class="p-4 border-b border-gray-200 flex items-center justify-between">
        <h3 class="text-lg font-medium">图表预览</h3>
        <button class="text-gray-400 hover:text-gray-600 mermaid-modal-close">
          <i class="fa fa-times"></i>
        </button>
      </div>
      <div class="flex-1 overflow-auto p-6" id="mermaidModalContent">
        <!-- 图表内容将通过JavaScript动态填充 -->
      </div>
    </div>
  </div>

  <script>
    // 全局变量
    let feeData = [];
    let currentEditId = null;
    
    // DOM 元素
    const feeTableBody = document.getElementById('feeTableBody');
    const emptyState = document.getElementById('emptyState');
    const searchBtn = document.getElementById('searchBtn');
    const searchInput = document.getElementById('searchInput');
    const adjustFeeBtn = document.getElementById('adjustFeeBtn');
    const adjustDropdown = document.getElementById('adjustDropdown');
    const uploadModal = document.getElementById('uploadModal');
    const closeUploadModal = document.getElementById('closeUploadModal');
    const cancelUploadBtn = document.getElementById('cancelUploadBtn');
    const selectFileBtn = document.getElementById('selectFileBtn');
    const fileInput = document.getElementById('fileInput');
    const removeFileBtn = document.getElementById('removeFileBtn');
    const startUploadBtn = document.getElementById('startUploadBtn');
    const selectedFiles = document.getElementById('selectedFiles');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const uploadStatus = document.getElementById('uploadStatus');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');
    const toastIcon = document.getElementById('toastIcon');
    
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      // 使用 requestAnimationFrame 优化渲染性能
      requestAnimationFrame(() => {
        // 加载本地存储的数据
        loadFeeData();
        // 渲染表格
        renderFeeTable();
        // 更新尺寸显示区域
        updateDimensionsDisplay();
        // 绑定事件
        bindEvents();
      });
    });
    
    // 更新尺寸显示区域
    function updateDimensionsDisplay() {
      // 缓存DOM元素查询
      const dimensionsDisplay = document.getElementById('dimensionsDisplay');
      const volumeWeightDisplay = document.getElementById('volumeWeightDisplay');
      const chargeableWeightDisplay = document.getElementById('chargeableWeightDisplay');
      
      if (feeData.length === 0) {
        dimensionsDisplay.textContent = '-';
        volumeWeightDisplay.textContent = '-';
        chargeableWeightDisplay.textContent = '-';
        return;
      }
      
      // 计算总体积重和计费重
      let totalVolumeWeight = 0;
      let totalActualWeight = 0;
      let hasDimensions = false;
      let dimensionsList = [];

      feeData.forEach(fee => {
        if (fee.volumeWeight) {
          totalVolumeWeight += fee.volumeWeight;
        }
        if (fee.unit === 'KG') {
          totalActualWeight += fee.amount; // 使用金额作为重量参考
        }
        if (fee.dimensions) {
          hasDimensions = true;
          dimensionsList.push(fee.dimensions);
        }
      });
      
      // 批量更新DOM，减少重排重绘
      const updates = {
        dimensions: hasDimensions ? dimensionsList.join(', ') : '-',
        volumeWeight: totalVolumeWeight > 0 ? totalVolumeWeight.toFixed(2) : '-',
        chargeableWeight: Math.max(totalActualWeight, totalVolumeWeight) > 0 ?
                          Math.max(totalActualWeight, totalVolumeWeight).toFixed(2) : '-'
      };
      
      dimensionsDisplay.textContent = updates.dimensions;
      volumeWeightDisplay.textContent = updates.volumeWeight;
      chargeableWeightDisplay.textContent = updates.chargeableWeight;
    }
    
    // 费用名称选项
    const feeNameOptions = [
      '超长费',
      '超重费',
      '燃油附加费',
      '偏远地区附加费',
      '仓储费',
      '其他费用'
    ];
    
    // 加载数据
    function loadFeeData() {
      const savedData = localStorage.getItem('feeData');
      if (savedData) {
        feeData = JSON.parse(savedData);
      } else {
        // 初始示例数据
        feeData = [
          {
            name: '超长费',
            unit: 'KG',
            amount: 255,
            newAmount: null,
            currency: 'USD',
            dimensions: '120x80x60',
            volumeWeight: 57.6,
            remark: '这是一段备注'
          },
          {
            name: '超重费',
            unit: '箱',
            amount: 250,
            newAmount: null,
            currency: 'USD',
            dimensions: '100x100x100',
            volumeWeight: 100.0,
            remark: '超出重量限制附加费'
          }
        ];
        saveFeeData();
      }
    }
    
    // 保存费用数据到localStorage
    function saveFeeData() {
      localStorage.setItem('feeData', JSON.stringify(feeData));
    }
    
    // 渲染表格
    function renderFeeTable() {
      if (feeData.length === 0) {
        feeTableBody.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }
      
      emptyState.classList.add('hidden');
      
      // 使用 DocumentFragment 优化DOM操作
      const fragment = document.createDocumentFragment();
      
      feeData.forEach(fee => {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-gray-50 transition-colors';
        tr.dataset.id = fee.id;
        tr.innerHTML = `
          <td class="px-4 py-3 text-sm">${fee.name}</td>
          <td class="px-4 py-3 text-sm">${fee.unit}</td>
          <td class="px-4 py-3 text-sm font-medium text-gray-700 bg-gray-50 rounded">${fee.amount.toFixed(2)}</td>
          <td class="px-4 py-3 text-sm font-medium text-primary bg-blue-50 rounded">${fee.newAmount ? fee.newAmount.toFixed(2) : '-'}</td>
          <td class="px-4 py-3 text-sm">${fee.currency}</td>
          <td class="px-4 py-3 text-sm">${fee.remark || '-'}</td>
          <td class="px-4 py-3 text-sm">
            <button class="px-2 py-1 bg-blue-500 text-white rounded hover:bg-blue-600 transition-colors mr-1" onclick="editFee('${fee.id}')">
              <i class="fas fa-edit"></i>
            </button>
            <button class="px-2 py-1 bg-red-500 text-white rounded hover:bg-red-600 transition-colors" onclick="deleteFee('${fee.id}')">
              <i class="fas fa-trash"></i>
            </button>
          </td>
        `;
        fragment.appendChild(tr);
      });
      
      // 一次性添加所有行到DOM
      feeTableBody.innerHTML = '';
      feeTableBody.appendChild(fragment);
      
      // 绑定表格行内按钮事件
      bindTableEvents();
    }
    
    // 渲染新增行
    function renderNewRow() {
      // 获取已使用的费用类型
      const usedFeeNames = feeData.map(fee => fee.name);
      // 过滤出可用的费用选项
      const availableFeeOptions = feeNameOptions.filter(name => !usedFeeNames.includes(name));

      const tr = document.createElement('tr');
      tr.className = 'bg-blue-50 border-l-4 border-blue-400';
      tr.dataset.mode = 'new';
      tr.innerHTML = `
        <td class="px-4 py-3 text-sm">
          <select class="w-full px-2 py-1 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" data-field="name">
            <option value="">请选择费用名称</option>
            ${availableFeeOptions.map(name => `<option value="${name}">${name}</option>`).join('')}
            ${usedFeeNames.length > 0 ? '<optgroup label="已使用的费用类型（不可选择）">' +
              usedFeeNames.map(name => `<option value="${name}" disabled>${name} (已使用)</option>`).join('') +
              '</optgroup>' : ''}
          </select>
        </td>
        <td class="px-4 py-3 text-sm">
          <select class="w-full px-2 py-1 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" data-field="unit">
            <option value="个">个</option>
            <option value="套">套</option>
            <option value="次">次</option>
            <option value="小时">小时</option>
            <option value="天">天</option>
            <option value="月">月</option>
            <option value="年">年</option>
            <option value="平方米">平方米</option>
            <option value="立方米">立方米</option>
            <option value="千克">千克</option>
            <option value="吨">吨</option>
            <option value="公里">公里</option>
          </select>
        </td>
        <td class="px-4 py-3 text-sm">
          <input type="number" class="w-24 px-2 py-1 border border-gray-300 rounded-md bg-gray-50" placeholder="原金额" readonly data-field="amount">
        </td>
        <td class="px-4 py-3 text-sm">
          <input type="number" class="w-24 px-2 py-1 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="新金额" step="0.01" min="0" data-field="newAmount">
        </td>
        <td class="px-4 py-3 text-sm">
          <select class="w-full px-2 py-1 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" data-field="currency">
            <option value="CNY">人民币</option>
            <option value="USD">美元</option>
            <option value="EUR">欧元</option>
          </select>
        </td>
        <td class="px-4 py-3 text-sm">
          <input type="text" class="w-full px-2 py-1 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="备注" data-field="remark">
        </td>
        <td class="px-4 py-3 text-sm">

    // 处理文件选择
    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      // 验证文件类型
      const allowedTypes = ['.xlsx', '.xls', '.csv'];
      const fileExtension = '.' + file.name.split('.').pop().toLowerCase();
      
      if (!allowedTypes.includes(fileExtension)) {
        showToast('请选择Excel或CSV格式的文件', 'error');
        fileInput.value = '';
        return;
      }
      
      // 验证文件大小（10MB）
      const maxSize = 10 * 1024 * 1024;
      if (file.size > maxSize) {
        showToast('文件大小不能超过10MB', 'error');
        fileInput.value = '';
        return;
      }
      
      // 显示文件信息
      fileName.textContent = file.name;
      fileSize.textContent = formatFileSize(file.size);
      selectedFiles.classList.remove('hidden');
      
      // 启用上传按钮
      startUploadBtn.disabled = false;
      startUploadBtn.className = 'px-4 py-2 bg-primary text-white rounded-md hover:bg-primary/90 transition-colors duration-200';
      startUploadBtn.title = '';
      
      uploadStatus.textContent = '文件已选择，准备上传';
    }

      startUploadBtn.disabled = true;

    // 格式化文件大小
    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // Mermaid图表放大预览
    function openMermaidModal(container) {
      const mermaidDiv = container.querySelector('.mermaid');
      if (!mermaidDiv) return;

      const modal = document.getElementById('mermaidModal');
      const modalContent = document.getElementById('mermaidModalContent');

      modalContent.innerHTML = mermaidDiv.innerHTML;
      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';

      if (window.mermaid) {
        mermaid.run({ querySelector: modalContent.querySelectorAll('.mermaid') });
      }
    }

    function closeMermaidModal(event) {
      if (event && event.target !== event.currentTarget && !event.target.closest('.mermaid-modal-close')) {
        return;
      }

      const modal = document.getElementById('mermaidModal');
      modal.classList.add('hidden');
      document.body.style.overflow = '';
    }
