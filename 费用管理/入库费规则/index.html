<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入库费规则 - ELSA</title>

  <!-- CDN 资源 -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1B3A4B',
            'primary-light': '#2A5568',
            'primary-dark': '#0F2430',
            accent: '#E8A838',
            'accent-light': '#F0C060',
            success: '#2D936C',
            'success-light': '#3DB87F',
            warning: '#D4853A',
            'warning-light': '#E09B55',
            danger: '#C44536',
            'danger-light': '#D65F52',
            dark: '#1A1A2E',
            'light-bg': '#F5F3EF',
            'card-bg': '#FFFFFF',
            border: '#D8D5CE',
            'border-light': '#E8E5DF',
            surface: '#F5F3EF',
            hover: '#EDE9E3',
            'text-secondary': '#5A6275',
            'text-muted': '#8B93A5'
          },
          boxShadow: {
            'card': '0 4px 16px rgba(27, 58, 75, 0.08)',
            'card-hover': '0 8px 32px rgba(27, 58, 75, 0.1)',
            'dropdown': '0 4px 16px rgba(27, 58, 75, 0.1)',
            'header': '0 1px 3px rgba(27, 58, 75, 0.06)',
            'accent': '0 4px 20px rgba(232, 168, 56, 0.15)'
          },
          fontFamily: {
            display: ['DM Sans', 'sans-serif'],
            body: ['Source Sans 3', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <!-- 模块样式 -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-body bg-surface text-dark min-h-screen">

  <!-- 头部导航 -->
  <header class="bg-primary text-white shadow-header sticky top-0 z-50" style="border-bottom: 2px solid #E8A838;">
    <div class="container mx-auto px-2 sm:px-3 lg:px-4">
      <div class="flex justify-between items-center h-14">
        <div class="flex items-center">
          <div class="flex-shrink-0 flex items-center">
            <span class="text-lg font-display font-semibold tracking-wide">ELSA</span>
          </div>
          <nav class="hidden md:ml-10 md:flex md:space-x-6">
            <div class="relative group">
              <a href="javascript:void(0)" class="px-3 py-2 text-sm hover:bg-primary/80 transition-colors flex items-center">
                费用管理
                <i class="fa fa-angle-down ml-1 text-xs"></i>
              </a>
              <div class="absolute left-0 mt-2 w-48 bg-white rounded-md shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                <a href="/费用管理/价卡管理/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">价卡管理</a>
                <a href="/费用管理/价卡配置系统/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">价卡配置</a>
                <a href="/费用管理/入库费规则/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover bg-hover font-medium">入库费规则</a>
                <a href="/费用管理/仓储规则/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">仓储规则</a>
                <a href="/费用管理/操作费规则/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">操作费规则</a>
                <a href="/费用管理/客户中心/价卡查询/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">价卡查询</a>
              </div>
            </div>
            <div class="relative group">
              <a href="javascript:void(0)" class="px-3 py-2 text-sm hover:bg-primary/80 transition-colors flex items-center">
                对账
                <i class="fa fa-angle-down ml-1 text-xs"></i>
              </a>
              <div class="absolute left-0 mt-2 w-48 bg-white rounded-md shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                <a href="/对账/成本明细/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">成本明细</a>
              </div>
            </div>
          </nav>
        </div>
        <div class="flex items-center space-x-4">
          <div class="relative">
            <button class="p-1.5 rounded hover:bg-primary/80 transition-colors">
              <i class="fa fa-bell-o"></i>
              <span class="absolute top-0 right-0 w-2 h-2 bg-warning rounded-full"></span>
            </button>
          </div>
          <div class="flex items-center">
            <span class="ml-2 text-sm hidden sm:inline-block">管理员</span>
            <i class="fa fa-angle-down ml-1 text-xs"></i>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- 原型/PRD/测试用例 Tab -->
  <div class="tabs">
    <button id="tab-prototype" class="tab active" onclick="switchMainTab('prototype')">原型</button>
    <button id="tab-prd" class="tab" onclick="switchMainTab('prd')">PRD</button>
    <button id="tab-testcases" class="tab" onclick="switchMainTab('testcases')">测试用例</button>
  </div>

  <!-- PRD 内容区域 -->
  <main id="main-prd" class="main-content">
    <div class="container mx-auto px-4 py-8">
      <div class="bg-white rounded-2xl shadow-xl p-8 lg:p-12">
        <div class="text-center py-16">
          <i class="fa fa-file-text-o text-5xl text-primary mb-4"></i>
          <p class="text-lg text-text-muted">PRD文档待补充</p>
        </div>
      </div>
    </div>
  </main>

  <!-- 测试用例内容区域 -->
  <main id="main-testcases" class="main-content">
    <div class="container mx-auto px-4 py-8">
      <div class="bg-white rounded-2xl shadow-xl p-8 lg:p-12">
        <div class="text-center py-16">
          <i class="fa fa-check-square-o text-5xl text-primary mb-4"></i>
          <p class="text-lg text-text-muted">测试用例待补充</p>
        </div>
      </div>
    </div>
  </main>

  <!-- 原型内容区域 -->
  <main id="main-prototype" class="main-content active">
    <div class="container mx-auto px-4 py-6 max-w-[1920px]">
      <!-- 筛选区域 -->
      <div class="filter-section animate-fade-in-up">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-sm font-display font-semibold text-dark">检索条件</h3>
        </div>
        <div class="filter-grid" id="filterContainer">
          <div class="filter-item">
            <label>费用组</label>
            <select id="filterFeeGroup">
              <option value="入库">入库</option>
              <option value="出库">出库</option>
              <option value="仓储">仓储</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="filter-item">
            <label>费用类型</label>
            <select id="filterFeeType">
              <option value="卸货费（整柜）">卸货费（整柜）</option>
              <option value="附加费（整柜）">附加费（整柜）</option>
              <option value="卸货费（散货）">卸货费（散货）</option>
              <option value="附加费（散货）">附加费（散货）</option>
            </select>
          </div>
          <div class="filter-item">
            <label>创建人</label>
            <input type="text" id="filterCreator" placeholder="请输入">
          </div>
          <div class="filter-item">
            <label>更新人</label>
            <input type="text" id="filterUpdater" placeholder="请输入">
          </div>
          <div class="filter-item">
            <label>创建时间</label>
            <div class="flex items-center gap-2">
              <input type="date" id="filterCreateTimeStart" class="flex-1">
              <span class="text-gray-500">至</span>
              <input type="date" id="filterCreateTimeEnd" class="flex-1">
            </div>
          </div>
          <div class="filter-item">
            <label>更新时间</label>
            <div class="flex items-center gap-2">
              <input type="date" id="filterUpdateTimeStart" class="flex-1">
              <span class="text-gray-500">至</span>
              <input type="date" id="filterUpdateTimeEnd" class="flex-1">
            </div>
          </div>
        </div>
        <div class="filter-actions">
          <button id="btnReset" class="erp-btn erp-btn-secondary">
            <i class="fa fa-refresh mr-1"></i> 重置
          </button>
          <button id="btnSearch" class="erp-btn erp-btn-primary">
            <i class="fa fa-search mr-1"></i> 搜索
          </button>
        </div>
      </div>

      <!-- 数据表格 -->
      <div class="content-section animate-fade-in-up">
        <div class="table-toolbar" id="tableToolbar">
          <button id="btnAddRule" class="erp-btn erp-btn-success">
            <i class="fa fa-plus-circle mr-1"></i> 新增
          </button>
          <button id="btnExport" class="erp-btn erp-btn-secondary">
            <i class="fa fa-download mr-1"></i> 导出
          </button>
        </div>
        <div class="table-container">
          <table class="data-table" id="dataTable">
            <thead id="tableHead">
              <tr>
                <th style="width:60px;">序号</th>
                <th style="width:150px;">费用组</th>
                <th style="width:250px;">费用类型</th>
                <th style="width:100px;">计费单位</th>
                <th style="width:100px;">创建人</th>
                <th style="width:150px;">创建时间</th>
                <th style="width:100px;">更新人</th>
                <th style="width:150px;">更新时间</th>
                <th style="width:150px;">失效时间</th>
                <th style="width:100px;">操作</th>
              </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
          </table>
        </div>
        <div class="table-footer">
          <span id="statisticsText">共 <strong>0</strong> 个费用类型</span>
        </div>
      </div>

      <!-- 逻辑说明（已拆分到独立页面） -->
      <div class="bg-white rounded shadow-card mt-4 overflow-hidden">
        <div class="px-4 py-3 bg-gradient-to-r from-primary/5 to-primary/10 border-b border-primary/20 flex justify-between items-center cursor-pointer" onclick="toggleLogicSection()">
          <div class="flex items-center">
            <i class="fa fa-book text-primary mr-2"></i>
            <span class="font-semibold text-primary">逻辑说明</span>
            <span class="ml-2 text-xs text-gray-500">(点击展开/收起)</span>
          </div>
          <i class="fa fa-chevron-down text-primary transition-transform" id="logic-icon"></i>
        </div>
        <div id="logic-content" class="hidden">
          <div class="p-4 bg-gray-50/30">
            <div class="flex items-center justify-center py-8">
              <div class="text-center">
                <i class="fa fa-file-alt text-4xl text-primary mb-3"></i>
                <p class="text-gray-600 mb-2">详细逻辑说明已拆分到独立页面</p>
                <a href="logic.html" class="inline-flex items-center px-4 py-2 bg-primary text-white rounded hover:bg-primary-light transition-colors">
                  <i class="fa fa-external-link mr-2"></i>查看详细逻辑说明
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
  </main>

  <!-- 工具函数 -->
  <script src="js/utils.js"></script>
  <!-- 映射表交互 -->
  <script src="js/mapping.js"></script>
  <!-- 费用类型树形数据 -->
  <script src="js/fee-item-data.js"></script>
  <!-- 本地数据（无fetch依赖） -->
  <script src="js/inbound-fee-rule-data.js"></script>
  <!-- 核心引擎 -->
  <script src="js/main.js"></script>
  <!-- 详情查看模块 -->
  <script src="js/detail.js"></script>
  <!-- 新增弹窗 - UI -->
  <script src="js/add-modal-ui.js"></script>
  <!-- 新增弹窗 - 逻辑 -->
  <script src="js/add-modal-logic.js"></script>
  <!-- 编辑弹窗 - UI -->
  <script src="js/edit-modal-ui.js"></script>
  <!-- 编辑弹窗 - 逻辑 -->
  <script src="js/edit-modal-logic.js"></script>
  <!-- 操作模块 -->
  <script src="js/actions.js"></script>
</body>
</html>
