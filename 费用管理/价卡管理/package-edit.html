<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑价卡 - ELSA</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1B3A4B',
            'primary-light': '#2A5568',
            'primary-dark': '#0F2430',
            accent: '#E8A838',
            'accent-light': '#F0C060',
            success: '#2D936C',
            'success-light': '#3DB87F',
            warning: '#D4853A',
            'warning-light': '#E09B55',
            danger: '#C44536',
            'danger-light': '#D65F52',
            dark: '#1A1A2E',
            'light-bg': '#F5F3EF',
            'card-bg': '#FFFFFF',
            border: '#D8D5CE',
            'border-light': '#E8E5DF',
            surface: '#F5F3EF',
            hover: '#EDE9E3',
            'text-secondary': '#5A6275',
            'text-muted': '#8B93A5'
          },
          boxShadow: {
            'card': '0 4px 16px rgba(27, 58, 75, 0.08)',
            'card-hover': '0 8px 32px rgba(27, 58, 75, 0.1)',
            'dropdown': '0 4px 16px rgba(27, 58, 75, 0.1)',
            'header': '0 1px 3px rgba(27, 58, 75, 0.06)',
            'accent': '0 4px 20px rgba(232, 168, 56, 0.15)'
          },
          fontFamily: {
            display: ['DM Sans', 'sans-serif'],
            body: ['Source Sans 3', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-body bg-surface text-dark min-h-screen">

  <header class="bg-primary text-white shadow-header sticky top-0 z-50" style="border-bottom: 2px solid #E8A838;">
    <div class="container mx-auto px-2 sm:px-3 lg:px-4">
      <div class="flex justify-between items-center h-14">
        <div class="flex items-center">
          <div class="flex-shrink-0 flex items-center">
            <span class="text-lg font-display font-semibold tracking-wide">ELSA</span>
          </div>
          <nav class="hidden md:ml-10 md:flex md:space-x-6">
            <div class="relative group">
              <a href="javascript:void(0)" class="px-3 py-2 text-sm hover:bg-primary/80 transition-colors flex items-center">
                费用管理
                <i class="fas fa-chevron-down ml-1 text-xs"></i>
              </a>
              <div class="absolute left-0 mt-2 w-48 bg-white rounded-md shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                <a href="index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover bg-hover font-medium">价卡管理</a>
                <a href="/费用管理/价卡配置系统/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">价卡配置</a>
                <a href="/费用管理/入库费规则/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">入库费规则</a>
                <a href="/费用管理/仓储规则/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">仓储规则</a>
                <a href="/费用管理/操作费规则/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">操作费规则</a>
                <a href="/费用管理/客户中心/价卡查询/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">价卡查询</a>
              </div>
            </div>
            <div class="relative group">
              <a href="javascript:void(0)" class="px-3 py-2 text-sm hover:bg-primary/80 transition-colors flex items-center">
                对账
                <i class="fas fa-chevron-down ml-1 text-xs"></i>
              </a>
              <div class="absolute left-0 mt-2 w-48 bg-white rounded-md shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                <a href="/对账/成本明细/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">成本明细</a>
              </div>
            </div>
          </nav>
        </div>
        <div class="flex items-center space-x-4">
          <div class="relative">
            <button class="p-1.5 rounded hover:bg-primary/80 transition-colors">
              <i class="fas fa-bell"></i>
              <span class="absolute top-0 right-0 w-2 h-2 bg-warning rounded-full"></span>
            </button>
          </div>
          <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-accent rounded-full flex items-center justify-center">
              <i class="fas fa-user text-sm"></i>
            </div>
            <span class="text-sm font-medium">管理员</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="container mx-auto px-2 sm:px-3 lg:px-4 py-6">

    <!-- 页面标题 -->
    <div class="mb-6">
      <div class="flex items-center justify-between">
        <a href="index.html" class="btn btn-secondary">
          <i class="fas fa-arrow-left mr-2"></i>返回列表
        </a>
      </div>
    </div>

    <!-- 编辑价卡表单 -->
    <div class="bg-white rounded-lg shadow-card">
      <form id="packageForm">
        <input type="hidden" id="packageId">

        <!-- 基本信息 -->
        <div class="px-6 py-4 border-b border-border-light">
          <h4 class="font-semibold text-primary flex items-center mb-4">
            <i class="fas fa-info-circle mr-2 text-accent"></i>基本信息
          </h4>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="form-group">
              <label class="form-label">价卡名称 <span class="text-danger">*</span></label>
              <input type="text" id="packageName" required
                     class="form-input" placeholder="请输入价卡名称">
            </div>
          </div>

          <div class="form-group mt-4">
            <label class="form-label">价卡描述</label>
            <textarea id="packageDescription" rows="3"
                      class="form-input" placeholder="请输入价卡描述"></textarea>
          </div>

          <!-- 创建信息 -->
          <div class="mt-4 p-3 bg-light-bg rounded-lg border border-border-light">
            <div class="grid grid-cols-2 gap-4 text-sm">
              <div>
                <span class="text-text-muted">创建人：</span>
                <span id="createdBy" class="font-medium text-text-secondary">-</span>
              </div>
              <div>
                <span class="text-text-muted">创建时间：</span>
                <span id="createdAt" class="font-medium text-text-secondary">-</span>
              </div>
            </div>
          </div>
        </div>

        <!-- 折扣配置 -->
        <div class="px-6 py-4">
          <h4 class="font-semibold text-primary flex items-center mb-4">
            <i class="fas fa-list-check mr-2 text-accent"></i>折扣配置
          </h4>

          <div class="mb-4">
            <div id="feeCategoryContent">
              <!-- 费用组 Tab 栏目 - 支持多费用组 -->
              <div class="fee-group-tabs mb-4">
                <div class="tabs-container">
                  <button class="tab-btn active" data-group="入库" onclick="switchFeeGroupTab('入库', event)">
                    <i class="fas fa-arrow-down mr-2"></i>入库
                  </button>
                  <button class="tab-btn" data-group="增值服务" onclick="switchFeeGroupTab('增值服务', event)">
                    <i class="fas fa-star mr-2"></i>增值服务
                  </button>
                </div>
              </div>

              <div class="overflow-x-auto border border-border rounded-lg">
                <table class="w-full">
                  <thead class="bg-light-bg">
                    <tr>
                      <th class="px-4 py-3 text-left text-xs font-semibold text-text-secondary uppercase">费用类型</th>
                      <th class="px-4 py-3 text-left text-xs font-semibold text-text-secondary uppercase">折扣方式</th>
                      <th class="px-4 py-3 text-left text-xs font-semibold text-text-secondary uppercase">备注</th>
                      <th class="px-4 py-3 text-left text-xs font-semibold text-text-secondary uppercase">操作</th>
                    </tr>
                  </thead>
                  <tbody id="feeItemsTableBody" class="divide-y divide-border-light">
                  </tbody>
                </table>
                
                <!-- 新增行按钮（表格下方） -->
                <div class="px-4 py-3 bg-light-bg border-t border-border-light">
                  <button type="button" onclick="addFeeRow()" class="btn btn-secondary btn-sm w-full">
                    <i class="fas fa-plus mr-2"></i>新增行
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 操作按钮 -->
        <div class="px-6 py-4 bg-light-bg border-t border-border-light flex justify-end gap-3">
          <a href="index.html" class="btn btn-secondary">
            <i class="fas fa-times mr-2"></i>取消
          </a>
          <button type="button" onclick="savePackage()" class="btn btn-primary">
            <i class="fas fa-save mr-2"></i>保存
          </button>
        </div>
      </form>
    </div>

  </main>

  <!-- 阶梯折扣配置弹窗（保持不变） -->
  <div id="tierDiscountModal" class="tier-discount-modal-overlay" style="display: none;">
    <div class="tier-discount-modal-container">
      <!-- 弹窗内容会动态生成 -->
    </div>
  </div>

  <!-- JavaScript 引用 -->
  <script src="../入库费规则/js/inbound-fee-rule-data.js"></script>
  <script src="../增值服务规则/js/value-added-service-data.js"></script>
  <script src="data/fee-categories-data.js"></script>
  <script src="js/utils.js"></script>
  <!-- 核心模块 -->
  <script src="js/state.js"></script>
  <script src="js/data-service.js"></script>
  <script src="js/fee-data.js"></script>
  <script src="js/discount-calculator.js"></script>
  <!-- 阶梯折扣模块 -->
  <script src="js/tier-discount-logic.js"></script>
  <script src="js/tier-discount-ui.js"></script>
  <!-- 弹窗模块 -->
  <script src="js/modal-standard-discount.js"></script>
  <script src="js/modal-tier-discount.js"></script>
  <!-- 页面模块 -->
  <script src="js/fee-table.js"></script>
  <script src="js/package-form.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() { PackageForm.initEdit(); });
  </script>

</body>
</html>
