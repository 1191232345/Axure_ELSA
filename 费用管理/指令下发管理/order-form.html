            warning: '#D4853A',

            danger: '#C44536',
            'danger-light': '#D65F52',
            dark: '#1A1A2E',
            'light-bg': '#F5F3EF',
            'card-bg': '#FFFFFF',
            border: '#D8D5CE',
            'border-light': '#E8E5DF',
            surface: '#F5F3EF',
            hover: '#EDE9E3',
            'text-secondary': '#5A6275',
            'text-muted': '#8B93A5'
          },
          boxShadow: {
            'card': '0 4px 16px rgba(27, 58, 75, 0.08)',
            'card-hover': '0 8px 32px rgba(27, 58, 75, 0.1)',
            'dropdown': '0 4px 16px rgba(27, 58, 75, 0.1)',
            'header': '0 1px 3px rgba(27, 58, 75, 0.06)',
            'accent': '0 4px 20px rgba(232, 168, 56, 0.15)'
          },
          fontFamily: {
            display: ['DM Sans', 'sans-serif'],
            body: ['Source Sans 3', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <!-- 模块样式 -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-body bg-surface text-dark min-h-screen">

  <!-- 头部导航 -->
  <header class="bg-primary text-white shadow-header sticky top-0 z-50" style="border-bottom: 2px solid #E8A838;">
    <div class="container mx-auto px-2 sm:px-3 lg:px-4">
      <div class="flex justify-between items-center h-14">
        <div class="flex items-center">
          <div class="flex-shrink-0 flex items-center">
            <span class="text-lg font-display font-semibold tracking-wide">ELSA</span>
          </div>
          <nav class="hidden md:ml-10 md:flex md:space-x-6">
            <div class="relative group">
              <a href="javascript:void(0)" class="px-3 py-2 text-sm hover:bg-primary/80 transition-colors flex items-center">
                费用管理
                <i class="fa fa-angle-down ml-1 text-xs"></i>
              </a>
              <div class="absolute left-0 mt-2 w-48 bg-white rounded-md shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                <a href="/费用管理/价卡管理/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">价卡管理</a>
                <a href="/费用管理/价卡配置系统/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">价卡配置</a>
                <a href="/费用管理/入库费规则/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">入库费规则</a>
                <a href="/费用管理/仓储规则/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">仓储规则</a>
                <a href="/费用管理/操作费规则/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">操作费规则</a>
                <a href="/费用管理/增值服务规则/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">增值服务规则</a>
                <a href="/费用管理/指令下发管理/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover bg-hover font-medium">指令下发管理</a>
                <a href="/费用管理/客户中心/价卡查询/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">价卡查询</a>
              </div>
            </div>
            <div class="relative group">
              <a href="javascript:void(0)" class="px-3 py-2 text-sm hover:bg-primary/80 transition-colors flex items-center">
                对账
                <i class="fa fa-angle-down ml-1 text-xs"></i>
              </a>
              <div class="absolute left-0 mt-2 w-48 bg-white rounded-md shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                <a href="/对账/成本明细/index.html" class="block px-4 py-2 text-sm text-dark hover:bg-hover">成本明细</a>
              </div>
            </div>
          </nav>
        </div>
        <div class="flex items-center space-x-4">
          <div class="relative">
            <button class="p-1.5 rounded hover:bg-primary/80 transition-colors">
              <i class="fa fa-bell-o"></i>
              <span class="absolute top-0 right-0 w-2 h-2 bg-warning rounded-full"></span>
            </button>
          </div>
          <div class="flex items-center">
            <span class="ml-2 text-sm hidden sm:inline-block">管理员</span>
            <i class="fa fa-angle-down ml-1 text-xs"></i>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- 原型/PRD/测试用例 Tab -->
  <div class="tabs">
    <button id="tab-prototype" class="tab active" onclick="switchMainTab('prototype')">原型</button>
    <button id="tab-prd" class="tab" onclick="switchMainTab('prd')">PRD</button>
    <button id="tab-testcases" class="tab" onclick="switchMainTab('testcases')">测试用例</button>
  </div>

  <!-- PRD 内容区域 -->
  <main id="main-prd" class="main-content">
    <div class="container mx-auto px-4 py-8">
      <div class="bg-white rounded-2xl shadow-xl p-8 lg:p-12">
        <div class="text-center py-16">
          <i class="fa fa-file-text-o text-5xl text-primary mb-4"></i>
          <p class="text-lg text-text-muted">PRD文档待补充</p>
        </div>
      </div>
    </div>
  </main>

  <!-- 测试用例内容区域 -->
  <main id="main-testcases" class="main-content">
    <div class="container mx-auto px-4 py-8">
      <div class="bg-white rounded-2xl shadow-xl p-8 lg:p-12">
        <div class="text-center py-16">
          <i class="fa fa-check-square-o text-5xl text-primary mb-4"></i>
          <p class="text-lg text-text-muted">测试用例待补充</p>
        </div>
      </div>
    </div>
  </main>

  <!-- 原型内容区域 -->
  <main id="main-prototype" class="main-content active">
    <div class="container mx-auto px-4 py-6 max-w-[1920px]">
      <!-- 页面标题 -->
      <div class="mb-6">
        <div class="flex items-center">
          <a href="index.html" class="text-text-secondary hover:text-primary transition-colors mr-4">
            <i class="fa fa-arrow-left"></i>
          </a>
          <div>
            <h1 id="formTitle" class="text-2xl font-display font-semibold text-primary">新建增值服务订单</h1>
            <p class="text-sm text-text-secondary mt-1">填写订单信息，提交增值服务指令</p>
          </div>
        </div>
      </div>

      <!-- 表单区域 -->
      <form id="orderForm" class="content-section animate-fade-in-up">
        <input type="hidden" id="orderId" value="">
        
        <!-- 客户信息 -->
        <div class="mb-6">
          <h3 class="text-sm font-display font-semibold text-dark mb-4 flex items-center">
            <i class="fa fa-user text-accent mr-2"></i>客户信息
          </h3>
          <div class="detail-grid">
            <div class="detail-item">
              <div class="detail-label">客户ID<em>*</em></div>
              <input type="text" id="customerId" class="modal-input" placeholder="请输入客户ID" required>
            </div>
            <div class="detail-item">
              <div class="detail-label">客户名称<em>*</em></div>
              <input type="text" id="customerName" class="modal-input" placeholder="请输入客户名称" required>
            </div>
          </div>
        </div>

        <!-- 仓库信息 -->
        <div class="mb-6">
          <h3 class="text-sm font-display font-semibold text-dark mb-4 flex items-center">
            <i class="fa fa-cube text-accent mr-2"></i>仓库信息
          </h3>
          <div class="detail-grid">
            <div class="detail-item">
              <div class="detail-label">仓库ID<em>*</em></div>
              <input type="text" id="warehouseId" class="modal-input" placeholder="请输入仓库ID" required>
            </div>
            <div class="detail-item">
              <div class="detail-label">仓库名称<em>*</em></div>
              <input type="text" id="warehouseName" class="modal-input" placeholder="请输入仓库名称" required>
            </div>
          </div>
        </div>

        <!-- 服务信息 -->
        <div class="mb-6">
          <h3 class="text-sm font-display font-semibold text-dark mb-4 flex items-center">
            <i class="fa fa-star text-accent mr-2"></i>服务信息
          </h3>
          <div class="detail-grid">
            <div class="detail-item">
              <div class="detail-label">服务类型<em>*</em></div>
              <select id="serviceType" class="modal-input" required>
                <option value="">请选择服务类型</option>
              </select>
            </div>
            <div class="detail-item">
              <div class="detail-label">数量<em>*</em></div>
              <input type="number" id="quantity" class="modal-input" placeholder="请输入数量" min="1" value="1" required>
            </div>
          </div>
        </div>

        <!-- 备注信息 -->
        <div class="mb-6">
          <h3 class="text-sm font-display font-semibold text-dark mb-4 flex items-center">
            <i class="fa fa-comment-o text-accent mr-2"></i>备注信息
          </h3>
          <div class="detail-item">
            <div class="detail-label">备注</div>
            <textarea id="remark" class="modal-input" placeholder="请输入备注信息（可选）" rows="3"></textarea>
          </div>
        </div>

        <!-- 操作按钮 -->
        <div class="filter-actions">
          <button type="button" id="cancelBtn" class="erp-btn erp-btn-secondary">
            <i class="fa fa-times mr-1"></i> 取消
          </button>
          <button type="submit" class="erp-btn erp-btn-success">
            <i class="fa fa-save mr-1"></i> 提交订单
          </button>
        </div>
      </form>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/form-handlers.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
