<div id="page-fee-add" class="page">
    <!-- 页面标题 -->
    <div class="bg-white rounded shadow-card p-4 mb-4">
        <div class="flex items-center justify-between">
            <div class="flex items-center">
                <button onclick="switchToPage('fee')" class="text-gray-500 hover:text-gray-700 mr-3">
                    <i class="fa fa-arrow-left"></i>
                </button>
                <h1 class="text-lg font-semibold text-gray-800">新增费用项</h1>
            </div>
        </div>
    </div>

    <!-- 表单卡片 -->
    <div class="bg-white rounded shadow-card p-6 mb-4">
        <form id="addFeeItemForm">
            <!-- 基本信息 -->
            <div class="mb-6">
                <h2 class="text-base font-semibold text-gray-800 mb-4">基本信息</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="form-group">
                        <label class="form-label">业务类型</label>
                        <select id="addFeeBusinessType" class="form-select" onchange="onBusinessTypeChange()">
                            <option value="">请选择</option>
                            <option value="inbound">入库</option>
                            <option value="outbound">出库</option>
                            <option value="transfer">卡车转仓</option>
                            <option value="return">退货</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">费用类型</label>
                        <select id="addFeeCategory" class="form-select" onchange="onFeeCategoryChange()">
                            <option value="">请选择</option>
                            <option value="storage">仓储费</option>
                            <option value="operation">操作费</option>
                            <option value="express">快递费</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">费用项名称</label>
                        <input type="text" id="addFeeItemName" class="form-input" placeholder="请输入费用项名称">
                    </div>
                    <div class="form-group">
                        <label class="form-label">计费单位</label>
                        <select id="addFeeUnit" class="form-select">
                            <option value="">请选择</option>
                            <option value="day">天</option>
                            <option value="piece">件</option>
                            <option value="volume">体积(m³)</option>
                            <option value="weight">重量(kg)</option>
                            <option value="pallet">托</option>
                            <option value="box">箱</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">有效期开始</label>
                        <input type="date" id="addFeeValidFrom" class="form-input" placeholder="请选择开始日期">
                    </div>
                    <div class="form-group">
                        <label class="form-label">有效期结束</label>
                        <input type="date" id="addFeeValidTo" class="form-input" placeholder="请选择结束日期">
                    </div>
                    <div class="form-group md:col-span-2">
                        <label class="form-label">适用客户</label>
                        <select id="addFeeCustomers" class="form-select" multiple style="height: 120px;">
                            <option value="customer1">客户A</option>
                            <option value="customer2">客户B</option>
                            <option value="customer3">客户C</option>
                            <option value="customer4">客户D</option>
                            <option value="customer5">客户E</option>
                        </select>
                        <div class="text-xs text-gray-500 mt-1">
                            <i class="fa fa-info-circle mr-1"></i>按住Ctrl键可多选客户
                        </div>
                    </div>
                </div>
            </div>

            <!-- 固定价格模式（快递费） -->
            <div id="fixedPriceSection" class="mb-6">
                <h2 class="text-base font-semibold text-gray-800 mb-4">价格配置</h2>
                <div class="form-group">
                    <label class="form-label">默认金额</label>
                    <input type="number" id="addFeeAmount" class="form-input" placeholder="请输入默认金额" min="0" step="0.01">
                </div>
            </div>

            <!-- 阶梯式价格配置（仓储费、操作费） -->
            <div id="tieredPriceSection" class="mb-6 hidden">
                <h2 class="text-base font-semibold text-gray-800 mb-4">阶梯价格配置</h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full border border-gray-200 rounded-lg">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-700 border-b">开始天数 <span class="text-red-500">*</span></th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-700 border-b">结束天数 <span class="text-red-500">*</span></th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-700 border-b">单位</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-700 border-b">单价 <span class="text-red-500">*</span></th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-700 border-b tier-minmax-header hidden">最低价 <span class="text-red-500">*</span></th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-700 border-b tier-minmax-header hidden">最高价 <span class="text-red-500">*</span></th>
                                <th class="px-4 py-3 text-center text-sm font-medium text-gray-700 border-b">操作</th>
                            </tr>
                        </thead>
                        <tbody id="priceTiersContainer" class="divide-y divide-gray-200">
                            <!-- 阶梯价格行 -->
                            <tr class="tier-row hover:bg-gray-50">
                                <td class="px-4 py-3">
                                    <input type="number" class="form-input w-full" placeholder="0" min="0" step="0.01" value="0" onchange="updateTierPreview()">
                                </td>
                                <td class="px-4 py-3">
                                    <input type="number" class="form-input w-full" placeholder="结束值" min="0" step="0.01" onchange="updateTierPreview()">
                                </td>
                                <td class="px-4 py-3">
                                    <select class="form-select w-full">
                                        <option value="volume">体积(m³)</option>
                                        <option value="weight">重量(kg)</option>
                                        <option value="pallet">托</option>
                                        <option value="box">箱</option>
                                    </select>
                                </td>
                                <td class="px-4 py-3">
                                    <input type="number" class="form-input w-full tier-price" placeholder="请输入" min="0" step="0.01" onchange="updateTierPreview()">
                                </td>
                                <td class="px-4 py-3 tier-minmax hidden">
                                    <input type="number" class="form-input w-full tier-min-price" placeholder="0" min="0" step="0.01" onchange="updateTierPreview()">
                                </td>
                                <td class="px-4 py-3 tier-minmax hidden">
                                    <input type="number" class="form-input w-full tier-max-price" placeholder="最高" min="0" step="0.01" onchange="updateTierPreview()">
                                </td>
                                <td class="px-4 py-3 text-center">
                                    <button type="button" class="text-gray-400 hover:text-gray-600" onclick="removeTier(this)" disabled title="至少保留一行">
                                        <i class="fa fa-minus-circle"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="mt-4 text-right">
                    <button type="button" class="erp-btn erp-btn-secondary" onclick="addPriceTier()">
                        <i class="fa fa-plus mr-1.5"></i> 添加阶梯
                    </button>
                </div>
            </div>

            <!-- 备注 -->
            <div class="mb-6">
                <h2 class="text-base font-semibold text-gray-800 mb-4">其他信息</h2>
                <div class="form-group">
                    <label class="form-label">备注</label>
                    <textarea id="addFeeRemark" class="form-textarea" placeholder="请输入备注信息" rows="2"></textarea>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="flex justify-end gap-3">
                <button type="button" onclick="switchToPage('fee')" class="erp-btn erp-btn-secondary">取消</button>
                <button type="button" onclick="saveFeeItemFromPage()" class="erp-btn erp-btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>
