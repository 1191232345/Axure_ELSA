    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            securityLevel: 'loose',
            logLevel: 'error'
        });
        
        const renderer = new marked.Renderer();
        renderer.code = function(code, language) {
            if (language && language.toLowerCase() === 'mermaid') {
                return '<div class="mermaid-container" onclick="openMermaidModal(this)"><div class="mermaid">' + code + '</div><span class="mermaid-hint"><i class="fa fa-search-plus mr-1"></i>点击放大</span></div>';
            }
            return '<pre><code class="language-' + (language || '') + '">' + code + '</code></pre>';
        };
        
        marked.setOptions({
            renderer: renderer,
            breaks: true,
            gfm: true
        });

        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                mermaid.run({
                    querySelector: '.mermaid',
                    suppressErrors: true
                });
            }, 200);
        });
    </script>
