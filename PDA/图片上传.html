<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传托盘照片</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .container {
            width: 100%;
            max-width: 414px;
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
        }
        .back-button {
            font-size: 24px;
            color: #333;
            text-decoration: none;
            margin-right: 16px;
        }
        .title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .status-bar {
            height: 20px;
            background-color: white;
            position: relative;
        }
        .status-info {
            position: absolute;
            top: 2px;
            right: 16px;
            font-size: 12px;
            color: #666;
        }
        .single-pallet-section {
            padding: 16px;
            border-top: 1px solid #e0e0e0;
        }
        .pallet-photo-title {
            font-size: 14px;
            color: #333;
            margin-bottom: 16px;
        }
        .pallet-photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .pallet-photo-item {
            position: relative;
        }
        .pallet-photo-upload {
            width: 100%;
            aspect-ratio: 1;
            border: 1px dashed #d0d0d0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fafafa;
        }
        .camera-icon {
            font-size: 24px;
            color: #999;
        }
        .submit-button {
            width: 90%;
            margin: 24px auto;
            display: block;
            padding: 14px;
            background-color: #1890ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-bar">
            <div class="status-info">2:30 | 4G | 94%</div>
        </div>
        <div class="header">
            <a href="复刻入库.html" class="back-button">&lt;</a>
            <h1 class="title">上传托盘照片</h1>
        </div>
        
        <div class="pallet-photo-section" id="palletPhotoSection">
        </div>
        
        <button class="submit-button" id="finalSubmitButton">最终提交</button>
    </div>
    
    <script>
        // 从URL获取托盘数量参数
        function getPalletCount() {
            const urlParams = new URLSearchParams(window.location.search);
            return parseInt(urlParams.get('count') || '1');
        }
        
        // 初始化页面
        function initPage() {
            const palletCount = getPalletCount();
            const photoSection = document.getElementById('palletPhotoSection');
            
            // 为每一托生成独立的上传区域
            for (let i = 1; i <= palletCount; i++) {
                const palletContainer = document.createElement('div');
                palletContainer.className = 'single-pallet-section';
                palletContainer.innerHTML = `
                    <h3 class="pallet-photo-title">* 托盘 ${i} 照片 (最多20张)</h3>
                    <div class="pallet-photo-grid" id="pallet${i}Photos">
                        <div class="pallet-photo-item">
                            <div class="pallet-photo-upload">
                                <input type="file" accept="image/*" style="display: none;" onchange="previewImage(this)">
                                <div class="camera-icon" onclick="this.parentElement.querySelector('input[type=file]').click()">📷</div>
                            </div>
                        </div>
                    </div>
                `;
                photoSection.appendChild(palletContainer);
            }
        }
        
        // 添加照片上传区域
        function addPhoto(containerId) {
            const container = document.getElementById(containerId);
            const photoItems = container.querySelectorAll('.pallet-photo-item');
            
            if (photoItems.length >= 20) {
                alert('每托最多上传20张照片');
                return;
            }
            
            const photoItem = document.createElement('div');
            photoItem.className = 'pallet-photo-item';
            photoItem.innerHTML = `
                <div class="pallet-photo-upload">
                    <input type="file" accept="image/*" style="display: none;" onchange="previewImage(this)">
                    <div class="camera-icon" onclick="this.parentElement.querySelector('input[type=file]').click()">📷</div>
                </div>
            `;
            container.appendChild(photoItem);
        }
        
        // 预览上传的图片
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const uploadDiv = input.parentElement;
                    uploadDiv.innerHTML = `<img src="${e.target.result}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 4px;">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        
        // 最终提交
        document.getElementById('finalSubmitButton').addEventListener('click', function() {
            alert('提交成功！');
            // 这里可以添加实际的提交逻辑
        });
        
        // 页面加载时初始化
        window.onload = initPage;
    </script>
</body>
</html>
