<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待送仓</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .container {
            width: 100%;
            max-width: 414px;
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
        }
        .back-button {
            font-size: 24px;
            color: #333;
            text-decoration: none;
            margin-right: 16px;
        }
        .title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .status-bar {
            height: 20px;
            background-color: white;
            position: relative;
        }
        .status-info {
            position: absolute;
            top: 2px;
            right: 16px;
            font-size: 12px;
            color: #666;
        }
        .section {
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-label {
            font-size: 14px;
            color: #666;
        }
        .info-value {
            font-size: 14px;
            color: #333;
        }
        .photo-section {
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
        }
        .photo-title {
            font-size: 14px;
            color: #333;
            margin-bottom: 12px;
        }
        .photo-upload {
            width: 100px;
            height: 100px;
            border: 1px dashed #d0d0d0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fafafa;
        }
        .camera-icon {
            font-size: 24px;
            color: #999;
        }
        .pallet-section {
            padding: 16px;
        }
        .pallet-label {
            font-size: 14px;
            color: #333;
            margin-bottom: 12px;
        }
        .pallet-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .pallet-photo-section {
            padding: 16px;
            border-top: 1px solid #e0e0e0;
        }
        .pallet-photo-title {
            font-size: 14px;
            color: #333;
            margin-bottom: 16px;
        }
        .pallet-photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .pallet-photo-item {
            position: relative;
        }
        .pallet-photo-upload {
            width: 100%;
            aspect-ratio: 1;
            border: 1px dashed #d0d0d0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fafafa;
        }
        .pallet-number {
            position: absolute;
            top: -8px;
            left: -8px;
            background-color: #1890ff;
            color: white;
            font-size: 12px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hidden {
            display: none;
        }
        .single-pallet-section {
            padding: 16px;
            border-top: 1px solid #e0e0e0;
        }
        .submit-button {
            width: 90%;
            margin: 24px auto;
            display: block;
            padding: 14px;
            background-color: #1890ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-bar">
            <div class="status-info">2:30 | 4G | 94%</div>
        </div>
        <div class="header">
            <a href="#" class="back-button">&lt;</a>
            <h1 class="title">待送仓</h1>
        </div>
        
        <div class="section">
            <h2 class="section-title">基本信息</h2>
            <div class="info-row">
                <span class="info-label">订单</span>
                <span class="info-value">2001490309720051730</span>
            </div>
            <div class="info-row">
                <span class="info-label">入库方式</span>
                <span class="info-value">散货</span>
            </div>
            <div class="info-row">
                <span class="info-label">柜号</span>
                <span class="info-value"></span>
            </div>
            <div class="info-row">
                <span class="info-label">提单号</span>
                <span class="info-value"></span>
            </div>
            <div class="info-row">
                <span class="info-label">业务类型</span>
                <span class="info-value">存储</span>
            </div>
        </div>
        
        <div class="photo-section">
            <h3 class="photo-title">* 货物照片(最多十张)</h3>
            <div class="photo-upload">
                <div class="camera-icon">📷</div>
            </div>
        </div>
        
        <div id="inputSection">
            <div class="pallet-section">
                <h3 class="pallet-label">* 到货托盘数:</h3>
                <input type="number" class="pallet-input" id="palletCount" min="1" placeholder="请输入到货托盘数">
            </div>
            
            <button class="submit-button" id="submitButton">提交</button>
        </div>
        
        
        <script>
            document.getElementById('submitButton').addEventListener('click', function() {
                const palletCount = document.getElementById('palletCount').value;
                
                if (!palletCount || palletCount < 1) {
                    alert('请输入有效的到货托盘数');
                    return;
                }
                
                // 打开新的图片上传页面，并传递托盘数量参数
                window.location.href = `图片上传.html?count=${palletCount}`;
            });
        </script>
    </div>
</body>
</html>
